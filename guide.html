<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>初めて投稿する方へ — CS国際会議トラッカー</title>
  <meta name="description" content="A practical, plain-spoken guide for first-time conference submitters: how to find a venue, prepare a submission, navigate review and rebuttal, register, present, and follow up. EN / 中文 / 日本語.">
  <link rel="canonical" href="https://cs-conference-tracker.github.io/guide.html">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%23185fa5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=56">
</head>
<body x-data="guidePage()" x-init="init()" x-cloak>

  <div class="disclaimer" role="note">
    <span aria-hidden="true">⚠️</span>
    <span x-text="t('disclaimer.text')"></span>
  </div>

  <header class="app-header">
    <div class="app-header__inner">
      <a class="app-header__brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">💻</span>
        <span class="brand-title" x-text="t('header.brand')"></span>
      </a>

      <div class="lang-dropdown" x-data="{open:false}" @click.outside="open=false">
        <button class="lang-dropdown__trigger" @click="open=!open"
                :aria-expanded="open" :aria-label="t('lang.label')">
          🌐 <span x-text="lang.toUpperCase()"></span>
        </button>
        <div class="lang-dropdown__menu" x-show="open" x-transition.opacity>
          <button :class="{active: lang==='en'}" @click="setLang('en'); open=false">English</button>
          <button :class="{active: lang==='ja'}" @click="setLang('ja'); open=false">日本語</button>
          <button :class="{active: lang==='zh'}" @click="setLang('zh'); open=false">中文</button>
        </div>
      </div>

      <a class="btn-outline" href="index.html">← <span x-text="t('guide.back')"></span></a>
    </div>
  </header>

  <main class="guide-page">
    <h1 x-text="t('guide.title')"></h1>
    <p class="guide-intro" x-text="t('guide.intro')"></p>

    <!-- Quick anchor nav -->
    <nav class="guide-nav" x-show="!loading">
      <template x-for="s in sections" :key="s.id">
        <a :href="'#' + s.id">
          <span x-text="s.icon"></span>
          <span x-text="i18n(s.title)"></span>
        </a>
      </template>
    </nav>

    <div class="loading" x-show="loading">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading guide…</p>
    </div>

    <template x-for="s in sections" :key="s.id">
      <section class="guide-section" :id="s.id" x-show="!loading">
        <h2>
          <span x-text="s.icon"></span>
          <span x-text="i18n(s.title)"></span>
        </h2>
        <p class="guide-section__intro" x-text="i18n(s.intro)"></p>
        <div class="guide-section__body" x-html="i18n(s.body)"></div>
      </section>
    </template>

    <div class="error" x-show="error" x-text="error"></div>
  </main>

  <footer class="app-footer">
    <div class="app-footer__inner">
      <a href="index.html">← <span x-text="t('guide.back')"></span></a>
      <span class="card__sep">·</span>
      <a href="https://github.com/cs-conference-tracker/cs-conference-tracker.github.io/issues"
         target="_blank" rel="noopener noreferrer"
         x-text="t('footer.feedback')"></a>
      <span class="card__sep">·</span>
      <span x-text="t('footer.org')"></span>
    </div>
  </footer>

  <!-- Floating 👍 button -->
  <div class="like-fab" x-data="likeWidget()" x-init="init()">
    <button class="like-fab__btn"
            :class="{'is-liked': liked, 'is-pulsing': pulse}"
            :disabled="liked"
            @click="like()"
            :title="t(liked ? 'likes.thanks' : 'likes.tooltip')"
            :aria-label="t('likes.aria')">
      <span class="like-fab__emoji" aria-hidden="true">👍</span>
      <span class="like-fab__count" x-text="displayCount()"></span>
    </button>
    <div class="like-fab__toast" x-show="showThanks" x-transition.opacity
         x-text="t('likes.thanks')"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/utils.js?v=56"></script>
  <script src="js/i18n.js?v=56"></script>
  <script src="js/likes.js?v=56"></script>
  <script>
    function guidePage() {
      return {
        loading: true,
        error: null,
        sections: [],
        lang: (CT.i18n && CT.i18n.getLang()) || 'ja',

        async init() {
          try {
            // Prefer pre-baked JSON if it exists, fall back to YAML.
            let data;
            const j = await fetch('data/guide.json');
            if (j.ok) {
              data = await j.json();
            } else {
              const y = await fetch('data/guide.yaml');
              if (!y.ok) throw new Error(`HTTP ${y.status}`);
              data = jsyaml.load(await y.text()) || {};
            }
            this.sections = (data && data.sections) || [];
            this.loading = false;
          } catch (e) {
            this.error = `Failed to load guide: ${e.message}`;
            this.loading = false;
          }
        },

        t(key) {
          void this.lang;
          return CT.i18n.t(key);
        },
        i18n(value) {
          void this.lang;
          return CT.utils.i18nText(value);
        },
        setLang(l) {
          CT.i18n.setLang(l);
          this.lang = l;
        },
      };
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
