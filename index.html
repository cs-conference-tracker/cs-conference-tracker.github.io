<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CS国際会議トラッカー</title>
  <meta name="description" content="CS conference deadline tracker — rankings, deadlines, locations across 380+ venues in EN/ZH/JA.">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='6' fill='%23185fa5'/%3E%3C/svg%3E">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link rel="stylesheet" href="styles.css?v=50">
</head>
<body x-data="trackerApp()" x-init="init()" x-cloak>

  <!-- Top-of-page disclaimer. Localized; small + subtle but always visible. -->
  <div class="disclaimer" role="note">
    <span aria-hidden="true">⚠️</span>
    <span x-text="t('disclaimer.text')"></span>
  </div>

  <header class="app-header">
    <div class="app-header__inner">
      <a class="app-header__brand" href="#view=cards">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-title" x-text="t('header.brand')"></span>
        <span class="brand-sub" x-show="t('header.sub')" x-text="t('header.sub')"></span>
      </a>

      <nav class="view-toggle" role="tablist" :aria-label="t('aria.viewSelector')">
        <button role="tab" :aria-selected="view==='cards'"
                :class="{active: view==='cards'}" @click="setView('cards')"
                x-text="t('view.list')"></button>
        <button role="tab" :aria-selected="view==='timeline'"
                :class="{active: view==='timeline'}" @click="setView('timeline')"
                x-text="t('view.timeline')"></button>
        <button role="tab" :aria-selected="view==='map'"
                :class="{active: view==='map'}" @click="setView('map')"
                x-text="t('view.map')"></button>
      </nav>

      <!-- Globe language switcher. Trigger shows just 🌐 + ISO code so it
           stays compact; menu lists languages alphabetically by code
           (en / ja / zh) — mechanical ordering, no implicit ranking. -->
      <div class="lang-dropdown" x-data="{open:false}" @click.outside="open=false">
        <button class="lang-dropdown__trigger" @click="open=!open"
                :aria-expanded="open" :aria-label="t('lang.label')">
          🌐 <span x-text="lang.toUpperCase()"></span>
        </button>
        <div class="lang-dropdown__menu" x-show="open" x-transition.opacity>
          <button :class="{active: lang==='en'}" @click="setLang('en'); open=false">English</button>
          <button :class="{active: lang==='ja'}" @click="setLang('ja'); open=false">日本語</button>
          <button :class="{active: lang==='zh'}" @click="setLang('zh'); open=false">中文</button>
        </div>
      </div>

      <button class="howto__reopen" @click="toggleHowto()"
              :title="t('howto.reopen')"
              :class="{'is-active': showHowto}">
        💡 <span x-text="t('howto.reopen')"></span>
      </button>

      <a class="howto__reopen" href="glossary.html"
         :title="t('footer.glossary')">
        📖 <span x-text="t('footer.glossary')"></span>
      </a>

    </div>
  </header>

  <!-- How-to-use onboarding panel. Floats above page content as a modal
       so the user can open it from any scroll position; clicking the
       backdrop or the close button dismisses (persisted in localStorage). -->
  <template x-if="showHowto">
    <div class="howto-overlay" @keydown.escape.window="dismissHowto()">
      <div class="howto-backdrop" @click="dismissHowto()"></div>
      <section class="howto" x-transition.opacity role="dialog" aria-modal="true"
               :aria-label="t('howto.title')">
        <div class="howto__inner">
          <header class="howto__head">
            <h2>💡 <span x-text="t('howto.title')"></span></h2>
            <button class="howto__close" @click="dismissHowto()" :aria-label="t('howto.dismiss')">×</button>
          </header>
          <div class="howto__grid">
            <article class="howto__card">
              <div class="howto__emoji">🔍</div>
              <h3 x-text="t('howto.search.title')"></h3>
              <p x-text="t('howto.search.desc')"></p>
            </article>
            <article class="howto__card">
              <div class="howto__emoji">📋📅🗺️</div>
              <h3 x-text="t('howto.views.title')"></h3>
              <p x-text="t('howto.views.desc')"></p>
            </article>
            <article class="howto__card">
              <div class="howto__emoji">🔽</div>
              <h3 x-text="t('howto.row.title')"></h3>
              <p x-text="t('howto.row.desc')"></p>
            </article>
            <article class="howto__card">
              <div class="howto__emoji">🌐</div>
              <h3 x-text="t('howto.lang.title')"></h3>
              <p x-text="t('howto.lang.desc')"></p>
            </article>
            <article class="howto__card">
              <div class="howto__emoji">📅</div>
              <h3 x-text="t('howto.cal.title')"></h3>
              <p x-text="t('howto.cal.desc')"></p>
            </article>
            <article class="howto__card">
              <div class="howto__emoji">🔗</div>
              <h3 x-text="t('howto.share.title')"></h3>
              <p x-text="t('howto.share.desc')"></p>
            </article>
          </div>
          <footer class="howto__foot">
            <button class="btn-primary" @click="dismissHowto()" x-text="t('howto.dismiss')"></button>
          </footer>
        </div>
      </section>
    </div>
  </template>

  <section class="filter-bar" x-show="view !== 'map' || true">
    <div class="filter-bar__inner">
      <label class="search">
        <svg class="search__icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <path d="m20 20-3.5-3.5"/>
        </svg>
        <input type="search" :placeholder="t('search.placeholder')"
               x-model.debounce.200ms="filters.q" @input="syncUrl()">
      </label>

      <div class="dropdown" x-data="{open:false}" @click.outside="open=false">
        <button class="dropdown__trigger" @click="open=!open" :aria-expanded="open">
          <span x-text="t('filter.topics')"></span>
          <span class="dropdown__count" x-show="filters.topics.length"
                x-text="filters.topics.length"></span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"
               stroke-width="1.5" aria-hidden="true"><path d="m2 4 3 3 3-3"/></svg>
        </button>
        <div class="dropdown__menu dropdown__menu--multi" x-show="open" x-transition.opacity>
          <template x-for="(topic, key) in glossary?.topics || {}" :key="key">
            <div class="dropdown__row">
              <label class="dropdown__option">
                <input type="checkbox" :value="key"
                       :checked="filters.topics.includes(key)"
                       @change="toggleTopic(key)">
                <span class="dropdown__option-key" x-text="key"></span>
                <span class="dropdown__option-name" x-text="iText(topic.full_name)"></span>
              </label>
              <button class="info-btn" @click.stop="openPopover($event, 'topic', key)"
                      :aria-label="t('filter.whatIsThis')">ⓘ</button>
            </div>
          </template>
        </div>
      </div>

      <div class="dropdown" x-data="{open:false}" @click.outside="open=false">
        <button class="dropdown__trigger" @click="open=!open" :aria-expanded="open">
          <span x-text="rankingLabel()"></span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"
               stroke-width="1.5" aria-hidden="true"><path d="m2 4 3 3 3-3"/></svg>
        </button>
        <div class="dropdown__menu dropdown__menu--checks" x-show="open" x-transition.opacity>
          <!-- "All" master checkbox. Ticking it resets to no filter; in
               that state every individual rank box is also rendered as
               ticked (visual reinforcement). Clicking any individual
               rank switches the filter on with just that pick. -->
          <label class="dropdown__check dropdown__check--all"
                 :class="{active: isAllRanksChecked()}">
            <input type="checkbox"
                   :checked="isAllRanksChecked()"
                   @change="toggleAllRanks()">
            <strong x-text="t('filter.allRanks')"></strong>
          </label>
          <template x-for="opt in rankingOptions" :key="opt.value">
            <label class="dropdown__check"
                   :class="{active: filters.ranks.includes(opt.value)}">
              <input type="checkbox"
                     :checked="isRankChecked(opt.value)"
                     @change="toggleRank(opt.value)">
              <span x-text="opt.label"></span>
            </label>
          </template>
        </div>
      </div>

      <div class="dropdown" x-data="{open:false}" @click.outside="open=false">
        <button class="dropdown__trigger" @click="open=!open" :aria-expanded="open">
          <span><span x-text="t('filter.sort')"></span>: <span x-text="sortLabel(filters.sort)"></span></span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor"
               stroke-width="1.5" aria-hidden="true"><path d="m2 4 3 3 3-3"/></svg>
        </button>
        <div class="dropdown__menu" x-show="open" x-transition.opacity>
          <template x-for="opt in sortOptions" :key="opt.value">
            <button class="dropdown__item" @click="setSort(opt.value); open=false"
                    :class="{active: filters.sort===opt.value}" x-text="t(opt.i18nKey)"></button>
          </template>
        </div>
      </div>

      <button class="filter-reset" x-show="filterDirty()" @click="resetFilters()"
              x-text="t('filter.reset')"></button>
    </div>
  </section>

  <main class="app-main">

    <!-- LOADING / ERROR -->
    <div class="loading" x-show="loading">
      <div class="spinner" aria-hidden="true"></div>
      <p x-text="t('state.loading')"></p>
    </div>
    <div class="error" x-show="error" x-text="error"></div>

    <!-- LIST VIEW -->
    <section x-show="view==='cards' && !loading" id="view-cards">
      <p class="result-summary" x-text="resultSummary()"></p>
      <div class="cards-empty" x-show="filteredConferences().length === 0 && !loading">
        <p x-text="t('state.empty')"></p>
        <button class="btn-outline" @click="resetFilters()" x-text="t('state.resetFilters')"></button>
      </div>
      <!-- Top-of-list pager status — total count + range -->
      <div class="pager pager--top" x-show="filteredConferences().length > pageSize">
        <span class="pager__status">
          <span x-text="t('pager.showing')"></span> <strong x-text="pageRangeLabel()"></strong>
          · <span x-text="t('pager.page')"></span> <strong x-text="currentPage"></strong>
          <span x-text="t('pager.of')"></span> <strong x-text="totalPages()"></strong>
        </span>
      </div>

      <div class="cards-wrap"><template x-for="conf in paginatedConferences()" :key="conf.id">
        <article class="row" :class="{'row--past': nextDeadline(conf).past, 'row--open': expanded[conf.id]}"
                 :data-conf-id="conf.id">
          <!-- Always-visible 2-line summary: line 1 = identity + pill;
               line 2 = when/where + chips + signals. Click anywhere
               on the summary toggles the expanded panel below. -->
          <div class="row__summary" @click="toggleExpanded(conf.id)" role="button"
               tabindex="0" @keydown.enter="toggleExpanded(conf.id)"
               @keydown.space.prevent="toggleExpanded(conf.id)"
               :aria-expanded="expanded[conf.id] ? 'true':'false'">
            <svg class="row__chev" :class="{open: expanded[conf.id]}" width="10" height="10"
                 viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"
                 aria-hidden="true"><path d="m3 2 3 3-3 3"/></svg>

            <div class="row__body">
              <!-- Line 1 -->
              <div class="row__line1">
                <span class="row__id">
                  <span class="row__acronym" x-text="conf.acronym"></span>
                  <span class="row__year" x-text="conf.year"></span>
                </span>
                <span class="row__name" x-text="conf.name" :title="conf.name"></span>
                <span class="pill"
                      :class="`pill--${nextDeadline(conf).urgency}`"
                      :title="nextDeadlineTitle(conf)">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 7v5l3 2"/>
                  </svg>
                  <span x-text="nextDeadline(conf).label"></span>
                </span>
              </div>

              <!-- One-line description: localized, truncated. Click row to
                   reveal the full text inside the expanded panel. -->
              <p class="row__desc row__desc--summary"
                 x-show="conf.description"
                 x-text="iText(conf.description)"
                 :title="iText(conf.description)"></p>

              <!-- Line 2 -->
              <div class="row__line2">
                <span class="row__meta">
                  <span x-text="formatConferenceDates(conf)"></span>
                  <span class="card__sep">·</span>
                  <span x-text="formatLocation(conf.location)"></span>
                </span>

                <span class="row__chips-inline" x-show="hasAnyRanking(conf) || (conf.topics||[]).length">
                  <template x-for="r in rankingChips(conf)" :key="'rkl-'+r.key">
                    <span class="chip chip--ranking chip--inline" x-text="r.short"
                          :title="r.tooltip"></span>
                  </template>
                  <template x-for="t in visibleTopics(conf)" :key="'tpl-'+t">
                    <span class="chip chip--topic chip--inline" x-text="t"
                          :title="iText(glossary?.topics?.[t]?.full_name) || t"></span>
                  </template>
                  <span class="chip chip--overflow chip--inline"
                        x-show="overflowTopicsCount(conf) > 0"
                        :title="(conf.topics || []).slice(4).join(', ')"
                        x-text="`+${overflowTopicsCount(conf)}`"></span>
                </span>

                <span class="row__signals">
                  <span class="row__signal row__signal--accept"
                        x-show="latestAcceptance(conf)"
                        :title="`${t('row.acceptance')} ${latestAcceptance(conf)?.pct}% (${latestAcceptance(conf)?.year})`"
                        x-text="`${latestAcceptance(conf)?.pct}% ${t('row.acceptSuffix')} '${String(latestAcceptance(conf)?.year ?? '').slice(2)}`"></span>
                  <span class="row__signal row__signal--alsoopen"
                        x-show="secondaryDeadlines(conf).length > 0"
                        :title="secondaryDeadlines(conf).map(d => d.shortLabel + ': ' + d.countdown).join('\n')"
                        x-text="`+${secondaryDeadlines(conf).length} ${t('row.alsoOpenSuffix')}`"></span>
                  <span class="row__signal row__signal--tracks"
                        x-show="conf.tracks && conf.tracks.length > 1"
                        :title="`${conf.tracks.length} ${t('row.tracksSuffix')}`"
                        x-text="`${conf.tracks.length} ${t('row.tracksSuffix')}`"></span>
                </span>
              </div>
            </div>
          </div>

          <!-- Expanded panel: full details + tracks + actions -->
          <div class="row__expanded" x-show="expanded[conf.id]" x-transition.opacity>
            <p class="row__desc" x-show="conf.description" x-text="iText(conf.description)"></p>

            <!-- Full ranking + topic chips (clickable for popovers) -->
            <div class="chip-row chip-row--combined">
              <template x-for="r in rankingChips(conf)" :key="'rkx-'+r.key">
                <button class="chip chip--ranking"
                        @click.stop="openPopover($event, 'ranking', r.key)"
                        :title="r.tooltip">
                  <span class="chip__label" x-text="r.short"></span>
                  <span class="chip__info" aria-hidden="true">ⓘ</span>
                </button>
              </template>
              <template x-for="t in (conf.topics || [])" :key="'tpx-'+t">
                <button class="chip chip--topic"
                        @click.stop="openPopover($event, 'topic', t)"
                        :title="iText(glossary?.topics?.[t]?.full_name) || t">
                  <span class="chip__label" x-text="t"></span>
                  <span class="chip__info" aria-hidden="true">ⓘ</span>
                </button>
              </template>
            </div>

            <!-- Secondary submission deadlines (other tracks / later cycles).
                 Each pill is now a button that opens the track_kind popover
                 so the user can read what the track is about (CIKM Resource
                 Track ≠ CIKM Industry Track, etc.). -->
            <div class="card__secondary" x-show="secondaryDeadlines(conf).length > 0">
              <span class="card__secondary-label" x-text="t('row.alsoOpen')"></span>
              <template x-for="d in secondaryDeadlines(conf)" :key="d.trackLabel + d.deadline.valueOf()">
                <button class="pill pill-sm pill-sm--clickable"
                        :class="`pill--${d.urgency}`"
                        :title="`${d.trackLabel} — ${d.kindLabel} (${t('row.explainTrack')})`"
                        @click.stop="openPopover($event, 'track_kind', d.trackKindKey)">
                  <span class="pill-sm__track" x-text="d.shortLabel"></span>
                  <span class="pill-sm__time" x-text="d.countdown"></span>
                  <span class="pill-sm__info" aria-hidden="true">ⓘ</span>
                </button>
              </template>
            </div>

            <!-- Past 5-year acceptance history (if available) -->
            <div class="row__accept" x-show="acceptanceHistory(conf).length > 0">
              <span class="row__accept-label" x-text="t('row.acceptance')"></span>
              <div class="row__accept-bars">
                <template x-for="a in acceptanceHistory(conf).slice(0, 5)" :key="a.year">
                  <div class="accept-bar" :title="`${a.year}: ${a.accepted ?? '?'} / ${a.submitted ?? '?'} accepted${a.track ? ' ('+a.track+')' : ''}`">
                    <div class="accept-bar__fill"
                         :style="`height: ${Math.min(100, (a.pct ?? 0) * 2)}%`"></div>
                    <span class="accept-bar__pct" x-text="a.pct != null ? a.pct + '%' : '—'"></span>
                    <span class="accept-bar__yr" x-text="String(a.year).slice(2)"></span>
                  </div>
                </template>
              </div>
            </div>

            <!-- Tracks / rounds / deadlines -->
            <div class="row__tracks">
              <template x-for="track in conf.tracks" :key="track.name">
                <div class="track">
                  <div class="track__head">
                    <h3 class="track__name" x-text="track.name"></h3>
                    <button class="info-btn"
                            @click.stop="openPopover($event, 'track_kind', trackKindKey(track.name))"
                            :title="t('row.explainTrack')"
                            :aria-label="t('row.explainTrack')">ⓘ</button>
                    <button class="badge" x-show="track.has_rebuttal"
                            @click.stop="openPopover($event, 'kind', 'rebuttal_start')">
                      <span x-text="t('row.rebuttal')"></span> <span aria-hidden="true">ⓘ</span>
                    </button>
                  </div>
                  <template x-for="(round, ridx) in track.rounds" :key="ridx">
                    <div class="round">
                      <p class="round__label" x-show="round.label" x-text="round.label"></p>
                      <ul class="deadline-list">
                        <template x-for="d in orderedDeadlines(round.deadlines)" :key="d.kind">
                          <li class="deadline" :class="`deadline--${d.urgency}`">
                            <span class="deadline__bar" aria-hidden="true"></span>
                            <button class="deadline__kind"
                                    @click.stop="openPopover($event, 'kind', d.kind)">
                              <span x-text="d.kindLabel"></span>
                              <span class="chip__info" aria-hidden="true">ⓘ</span>
                            </button>
                            <span class="deadline__when" :title="d.aoeTitle"
                                  x-text="d.when"></span>
                          </li>
                        </template>
                      </ul>
                    </div>
                  </template>
                </div>
              </template>
            </div>

            <!-- Action buttons -->
            <div class="row__actions">
              <button class="btn-outline" @click.stop="downloadIcs(conf)">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="16" rx="2"/>
                  <path d="M3 9h18M8 3v4M16 3v4"/>
                </svg>
                <span x-text="t('row.addCalendar')"></span>
              </button>
              <a class="btn-outline" :href="conf.website" target="_blank" rel="noopener noreferrer"
                 @click.stop>
                <span x-text="t('row.officialSite')"></span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" aria-hidden="true">
                  <path d="M7 17 17 7M9 7h8v8"/>
                </svg>
              </a>
            </div>
          </div>
        </article>
      </template></div><!-- /cards-wrap -->

      <!-- Bottom pager controls -->
      <nav class="pager pager--bottom" x-show="filteredConferences().length > pageSize"
           :aria-label="t('aria.pagination')">
        <button class="pager__btn" :disabled="currentPage === 1"
                @click="goToPage(currentPage - 1)" :aria-label="t('pager.prev')">←</button>
        <template x-for="item in pagerItems()" :key="item + Math.random()">
          <button class="pager__btn pager__btn--num"
                  :class="{active: item === currentPage, ellipsis: item === '…'}"
                  :disabled="item === '…'"
                  @click="typeof item === 'number' && goToPage(item)"
                  x-text="item"></button>
        </template>
        <button class="pager__btn" :disabled="currentPage === totalPages()"
                @click="goToPage(currentPage + 1)" :aria-label="t('pager.next')">→</button>
        <span class="pager__status pager__status--bottom" x-text="pageRangeLabel()"></span>
      </nav>
    </section>

    <!-- TIMELINE VIEW -->
    <section x-show="view==='timeline' && !loading" id="view-timeline" class="timeline-wrap">
      <div id="timeline-mount"></div>
    </section>

    <!-- MAP VIEW -->
    <section x-show="view==='map' && !loading" id="view-map" class="map-wrap">
      <div class="map-header">
        <p class="map-summary" x-text="mapSummary()"></p>
      </div>
      <div id="map" aria-label="World map showing upcoming conference deadlines." role="region"></div>
    </section>

  </main>

  <!-- Popover singleton -->
  <div id="popover" class="popover" x-show="popover.open" x-transition.opacity
       :style="popover.style" role="dialog" aria-modal="false" @click.outside="closePopover()"
       @keydown.escape.window="closePopover()">
    <template x-if="popover.open && popover.content">
      <div>
        <h4 class="popover__title">
          <span x-text="popover.content.titleKey"></span>
          <span class="popover__title-sep" x-show="popover.content.titleName"> · </span>
          <span x-text="popover.content.titleName"></span>
        </h4>
        <p class="popover__sub" x-show="popover.content.subtitle"
           x-text="popover.content.subtitle"></p>
        <p class="popover__body" x-text="popover.content.description"></p>
        <p class="popover__extra" x-show="popover.content.extra"
           x-html="popover.content.extra"></p>
      </div>
    </template>
  </div>

  <!-- Conference side panel (used by map upcoming mode).
       Renders a paginated list (max sidePanel.perPage per page) so a city
       with many conferences doesn't overflow and push the map content. -->
  <aside class="side-panel" :class="{open: sidePanel.open}" x-show="sidePanel.open"
         x-transition.opacity @keydown.escape.window="closeSidePanel()">
    <header class="side-panel__head">
      <h2 x-text="sidePanel.title"></h2>
      <button class="side-panel__close" @click="closeSidePanel()" :aria-label="t('side.close')">×</button>
    </header>

    <!-- Pager (only shown when more than one page of confs at this location) -->
    <div class="side-panel__pager" x-show="sidePanelTotalPages() > 1">
      <button class="btn-link" @click="sidePanelPrevPage()"
              :disabled="sidePanel.page === 0">← <span x-text="t('side.prev')"></span></button>
      <span class="side-panel__pager-status">
        <span x-text="t('pager.page')"></span>
        <strong x-text="sidePanel.page + 1"></strong>
        <span x-text="t('pager.of')"></span>
        <strong x-text="sidePanelTotalPages()"></strong>
      </span>
      <button class="btn-link" @click="sidePanelNextPage()"
              :disabled="sidePanel.page + 1 >= sidePanelTotalPages()"><span x-text="t('side.next')"></span> →</button>
    </div>

    <div class="side-panel__body">
      <template x-for="conf in sidePanelPageConfs()" :key="conf.id">
        <article class="side-panel__card">
          <header class="side-panel__card-head">
            <span class="row__acronym" x-text="conf.acronym"></span>
            <span class="row__year" x-text="conf.year"></span>
            <span class="pill"
                  :class="`pill--${nextDeadline(conf).urgency}`"
                  :title="nextDeadlineTitle(conf)">
              <span x-text="nextDeadline(conf).label"></span>
            </span>
          </header>
          <p class="side-panel__name" x-text="conf.name"></p>
          <p class="side-panel__meta">
            <span x-text="formatConferenceDates(conf)"></span>
            <span class="card__sep">·</span>
            <span x-text="formatLocation(conf.location)"></span>
          </p>
          <p class="side-panel__desc" x-show="conf.description"
             x-text="iText(conf.description)"></p>
          <!-- Tracks + deadlines, collapsed by default. Click the toggle to
               expand a per-conf detail block within the side panel. -->
          <details class="side-panel__details">
            <summary x-text="t('side.showDeadlines')"></summary>
            <template x-for="track in conf.tracks" :key="track.name">
              <div class="track">
                <div class="track__head">
                  <h3 class="track__name" x-text="track.name"></h3>
                </div>
                <template x-for="(round, ridx) in track.rounds" :key="ridx">
                  <div class="round">
                    <p class="round__label" x-show="round.label" x-text="round.label"></p>
                    <ul class="deadline-list">
                      <template x-for="d in orderedDeadlines(round.deadlines)" :key="d.kind">
                        <li class="deadline" :class="`deadline--${d.urgency}`">
                          <span class="deadline__bar" aria-hidden="true"></span>
                          <span class="deadline__kind" x-text="d.kindLabel"></span>
                          <span class="deadline__when" :title="d.aoeTitle" x-text="d.when"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>
              </div>
            </template>
          </details>
          <div class="side-panel__actions">
            <button class="btn-outline btn-outline--sm" @click="downloadIcs(conf)"
                    x-text="t('row.addCalendar')"></button>
            <a class="btn-outline btn-outline--sm" :href="conf.website" target="_blank"
               rel="noopener noreferrer" x-text="t('row.officialSite')"></a>
          </div>
        </article>
      </template>
    </div>
  </aside>

  <!-- Mobile bottom-sheet wrapper (popover transforms into this when narrow) -->
  <div class="sheet-backdrop" x-show="popover.open && isMobile" @click="closePopover()"
       x-transition.opacity></div>

  <!-- Add-to-calendar modal — pure client-side. Each deadline has a
       checkbox; bulk action buttons at the bottom act on the ticked set:
       open ticked in Google Calendar (one tab per pick), Outlook (same),
       or download all ticked as one bundled .ics file. Default selection
       is just the primary submission deadline. -->
  <template x-if="calModal.open">
    <div class="modal-backdrop" @click="closeCalModal()"
         @keydown.escape.window="closeCalModal()"></div>
  </template>
  <template x-if="calModal.open">
    <div class="modal" role="dialog" aria-modal="true" :aria-label="t('cal.title')">
      <header class="modal__head">
        <h3>📅 <span x-text="t('cal.title')"></span></h3>
        <button class="modal__close" @click="closeCalModal()"
                :aria-label="t('side.close')">×</button>
      </header>
      <div class="modal__body" x-show="calModal.conf">
        <p class="modal__sub">
          <strong x-text="calModal.conf?.acronym + ' ' + calModal.conf?.year"></strong>
          <span> · </span>
          <span x-text="iText(calModal.conf?.name)"></span>
        </p>
        <p class="modal__help" x-text="t('cal.help')"></p>

        <!-- Tick header + select-all / clear links -->
        <div class="modal__picker-head" x-show="calModal.deadlines.length">
          <span>
            <span x-text="t('cal.pickerLabel')"></span>
            (<span x-text="selectedCalCount()"></span> /
             <span x-text="calModal.deadlines.length"></span>)
          </span>
          <div class="modal__picker-actions">
            <button type="button" class="btn-link" @click="selectAllCalDeadlines()"
                    x-text="t('mail.selectAll')"></button>
            <span>·</span>
            <button type="button" class="btn-link" @click="clearCalSelection()"
                    x-text="t('mail.selectNone')"></button>
          </div>
        </div>

        <ul class="cal-rows" x-show="calModal.deadlines.length">
          <template x-for="d in calModal.deadlines" :key="d.key">
            <li class="cal-row">
              <label class="cal-row__pick">
                <input type="checkbox"
                       :checked="calModal.selected[d.key]"
                       @change="toggleCalDeadline(d.key)">
                <div class="cal-row__info">
                  <span class="cal-row__kind" x-text="d.kindLabel"></span>
                  <span class="cal-row__track"
                        x-text="d.trackName + (d.roundLabel ? ' · ' + d.roundLabel : '')"></span>
                  <span class="cal-row__when"
                        x-text="d.value.format('YYYY-MM-DD HH:mm') + ' AoE'"></span>
                </div>
              </label>
            </li>
          </template>
        </ul>

        <p class="modal__error" x-show="selectedCalCount() === 0"
           x-text="t('cal.errEmpty')"></p>

        <!-- Bulk action buttons — all act on the ticked set -->
        <div class="cal-actions">
          <button class="btn-outline" @click="calGcalSelected()"
                  :disabled="selectedCalCount() === 0"
                  :title="t('cal.gcalHint')">
            📅 <span x-text="t('cal.gcalBtn')"></span>
          </button>
          <button class="btn-outline" @click="calOutlookSelected()"
                  :disabled="selectedCalCount() === 0"
                  :title="t('cal.outlookHint')">
            📅 <span x-text="t('cal.outlookBtn')"></span>
          </button>
          <button class="btn-primary" @click="calIcsSelected()"
                  :disabled="selectedCalCount() === 0">
            📥 <span x-text="t('cal.icsBtn')"></span>
          </button>
        </div>
        <p class="modal__help" x-show="selectedCalCount() > 1 && !calModal.bulkHint"
           x-text="t('cal.popupHint')"></p>

        <!-- Post-action banner: when user clicked "Add ticked to Google
             Calendar / Outlook" with N>1 ticks, we downloaded the bundle
             .ics and now tell them where to import it. -->
        <div class="cal-bulk-banner" x-show="calModal.bulkHint === 'gcal'"
             x-transition.opacity>
          <p x-html="t('cal.bulkGcalHint')"></p>
        </div>
        <div class="cal-bulk-banner" x-show="calModal.bulkHint === 'outlook'"
             x-transition.opacity>
          <p x-html="t('cal.bulkOutlookHint')"></p>
        </div>
      </div>
    </div>
  </template>

  <!-- First-visit hint -->
  <div class="toast" x-show="showHint" x-transition>
    <span x-text="t('hint.body')"></span>
    <button class="btn-outline" @click="dismissHint()" x-text="t('hint.dismiss')"></button>
  </div>

  <!-- Floating 👍 button — fixed bottom-right, follows scrolling. Local
       Alpine component so it works independently of the main app state and
       can be reused on the glossary page. -->
  <div class="like-fab" x-data="likeWidget()" x-init="init()">
    <button class="like-fab__btn"
            :class="{'is-liked': liked, 'is-pulsing': pulse}"
            :disabled="liked"
            @click="like()"
            :title="t(liked ? 'likes.thanks' : 'likes.tooltip')"
            :aria-label="t('likes.aria')">
      <span class="like-fab__emoji" aria-hidden="true">👍</span>
      <span class="like-fab__count" x-text="displayCount()"></span>
    </button>
    <div class="like-fab__toast" x-show="showThanks" x-transition.opacity
         x-text="t('likes.thanks')"></div>
  </div>

  <footer class="app-footer">
    <div class="app-footer__inner">
      <a href="glossary.html" x-text="t('footer.glossary')"></a>
      <span class="card__sep">·</span>
      <span x-text="t('footer.about')"></span>
      <span class="card__sep">·</span>
      <span><span x-text="t('footer.lastUpdate')"></span>: <time x-text="lastUpdateDate"></time></span>
    </div>
  </footer>

  <!-- Libraries (CDN, no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/relativeTime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/duration.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/advancedFormat.js"></script>
  <script>
    dayjs.extend(dayjs_plugin_utc);
    dayjs.extend(dayjs_plugin_timezone);
    dayjs.extend(dayjs_plugin_relativeTime);
    dayjs.extend(dayjs_plugin_duration);
    dayjs.extend(dayjs_plugin_advancedFormat);
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <!-- App modules -->
  <!-- ?v=N appended so browsers re-fetch when scripts change.
       Bump N whenever any JS module is edited. -->
  <script src="js/i18n.js?v=50"></script>
  <script src="js/utils.js?v=50"></script>
  <script src="js/glossary.js?v=50"></script>
  <script src="js/ics.js?v=50"></script>
  <script src="js/map.js?v=50"></script>
  <script src="js/timeline.js?v=50"></script>
  <script src="js/cards.js?v=50"></script>
  <script src="js/likes.js?v=50"></script>
  <script src="js/app.js?v=50"></script>

  <!-- Alpine.js (loaded last, defer so it picks up trackerApp factory) -->
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
