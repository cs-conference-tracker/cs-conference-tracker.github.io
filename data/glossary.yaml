topics:
  AI:
    full_name:
      en: Artificial Intelligence
      zh: 人工智能
      ja: 人工知能
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Broad umbrella for systems that perform tasks normally requiring human intelligence — reasoning, planning, learning, perception, decision-making. Includes symbolic AI, multi-agent systems, search, and overlaps heavily with ML. Flagship venues: AAAI, IJCAI.'
      zh: 让计算机完成通常需要人类智能的任务的统称 —— 推理、规划、学习、感知、决策。涵盖符号 AI、多智能体、搜索等子领域，与机器学习高度重叠。代表会议：AAAI、IJCAI。
      ja: 推論、計画、学習、知覚、意思決定など、通常人間の知能を必要とするタスクをコンピュータに実行させる総称。記号 AI、マルチエージェント、探索などを含み、ML と大きく重なる。代表会議：AAAI、IJCAI。
  ML:
    full_name:
      en: Machine Learning
      zh: 机器学习
      ja: 機械学習
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Algorithms that improve through data — supervised, unsupervised, reinforcement, deep learning. The most active area in CS today; covers everything from learning theory to large-model training infrastructure. Flagship venues: NeurIPS, ICML, ICLR.'
      zh: 通过数据自动改进性能的算法 —— 监督学习、无监督学习、强化学习、深度学习。当下 CS 最活跃的领域，从学习理论到大模型训练基础设施都涵盖。代表会议：NeurIPS、ICML、ICLR。
      ja: データから学習して性能を向上させるアルゴリズム —— 教師あり／教師なし／強化学習／ディープラーニング。CS 分野で最も活発で、学習理論から大規模モデルの学習基盤まで幅広い。代表会議：NeurIPS、ICML、ICLR。
  DM:
    full_name:
      en: Data Mining
      zh: 数据挖掘
      ja: データマイニング
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Discovering patterns, anomalies, and predictive signals in large datasets — clustering, frequent pattern mining, recommendation systems, graph analytics. Closely tied to databases on the storage side and ML on the modeling side. Flagship venues: KDD, ICDM, WSDM.'
      zh: 从大规模数据中挖掘模式、异常和预测信号 —— 聚类、频繁模式挖掘、推荐系统、图分析。存储侧紧靠数据库，建模侧紧靠 ML。代表会议：KDD、ICDM、WSDM。
      ja: 大規模データから、パターン、異常、予測シグナルを発見する分野 —— クラスタリング、頻出パターン、推薦システム、グラフ解析。ストレージ側は DB と、モデル側は ML と密接に関連。代表会議：KDD、ICDM、WSDM。
  NLP:
    full_name:
      en: Natural Language Processing
      zh: 自然语言处理
      ja: 自然言語処理
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Understanding and generating human language — translation, question answering, dialogue, summarization, sentiment, parsing. Dominated since ~2018 by transformer-based LLMs. Flagship venues: ACL, EMNLP, NAACL.'
      zh: 让计算机理解和生成人类语言 —— 翻译、问答、对话、摘要、情感分析、句法分析等。约 2018 年起被 Transformer 大模型主导。代表会议：ACL、EMNLP、NAACL。
      ja: 人間の言語を理解・生成する分野 —— 機械翻訳、質問応答、対話、要約、感情分析、構文解析など。2018 年頃から Transformer ベースの大規模言語モデルが主流。代表会議：ACL、EMNLP、NAACL。
  CV:
    full_name:
      en: Computer Vision
      zh: 计算机视觉
      ja: コンピュータビジョン
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Extracting meaning from images and video — detection, segmentation, tracking, generation, 3D reconstruction, scene understanding. Drives autonomous driving, AR/VR, medical imaging, robotics. Flagship venues: CVPR, ICCV, ECCV.'
      zh: 从图像和视频中提取语义 —— 检测、分割、跟踪、生成、三维重建、场景理解等。自动驾驶、AR/VR、医学影像、机器人都依赖它。代表会议：CVPR、ICCV、ECCV。
      ja: 画像や動画から意味を抽出する分野 —— 検出、セグメンテーション、追跡、生成、3D 再構成、シーン理解など。自動運転、AR/VR、医療画像、ロボティクスを支える。代表会議：CVPR、ICCV、ECCV。
  IR:
    full_name:
      en: Information Retrieval
      zh: 信息检索
      ja: 情報検索
    category:
      en: AI / ML
      zh: AI / 机器学习
      ja: AI / 機械学習
    description:
      en: 'Helping users find relevant information — web/document search, ranking, recommendation, query understanding, learning-to-rank. Where search engines, recommender systems, and RAG pipelines live. Flagship venues: SIGIR, WWW/WebConf, WSDM.'
      zh: 帮助用户找到相关信息 —— 网页/文档搜索、排序、推荐、查询理解、Learning-to-Rank。搜索引擎、推荐系统、RAG 检索增强生成都属于这里。代表会议：SIGIR、WWW/WebConf、WSDM。
      ja: ユーザーが関連情報を見つけるための分野 —— Web/文書検索、ランキング、推薦、クエリ理解、Learning-to-Rank。検索エンジン、推薦システム、RAG パイプラインがここに属する。代表会議：SIGIR、WWW/WebConf、WSDM。
  HCI:
    full_name:
      en: Human-Computer Interaction
      zh: 人机交互
      ja: ヒューマンコンピュータインタラクション
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'How humans interact with computing — interface design, user studies, accessibility, qualitative methods. The "people" side of CS; emphasizes empirical evaluation with real users. Flagship venues: CHI, UIST, CSCW.'
      zh: 研究人与计算机系统的交互 —— 界面设计、用户研究、无障碍、定性方法。CS 中关注「人」的一面，强调与真实用户的实证评估。代表会议：CHI、UIST、CSCW。
      ja: 人とコンピュータの相互作用を研究する分野 —— UI 設計、ユーザー調査、アクセシビリティ、定性的手法。CS の中で「人」を扱う側面で、実ユーザーでの実証評価を重視。代表会議：CHI、UIST、CSCW。
  Ubicomp:
    full_name:
      en: Ubiquitous Computing
      zh: 普适计算
      ja: ユビキタスコンピューティング
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Computing that disappears into everyday environments — wearables, ambient sensing, context-awareness, smart homes. Heavy overlap with HCI, Mobile, and IoT. Flagship venues: UbiComp/ISWC, IMWUT/PACM HCI.'
      zh: 让计算无缝融入日常环境 —— 可穿戴、环境感知、上下文感知、智能家居等。与 HCI、Mobile、IoT 高度重叠。代表会议：UbiComp/ISWC、IMWUT/PACM HCI。
      ja: コンピューティングが日常環境に溶け込む分野 —— ウェアラブル、環境センシング、コンテキスト認識、スマートホームなど。HCI、Mobile、IoT と大きく重なる。代表会議：UbiComp/ISWC、IMWUT/PACM HCI。
  Mobile:
    full_name:
      en: Mobile Computing
      zh: 移动计算
      ja: モバイルコンピューティング
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Anything running on or for mobile devices — mobile networking, energy efficiency, OS for phones, mobile apps + services. Spans the wireless protocol stack up through user-facing apps. Flagship venues: MobiCom, MobiSys, SenSys.'
      zh: 与移动设备相关的一切 —— 移动网络、能效、手机操作系统、移动应用与服务。从无线协议栈一直延伸到面向用户的应用层。代表会议：MobiCom、MobiSys、SenSys。
      ja: モバイルデバイス上で動く／向けの全てを扱う —— モバイルネットワーク、省電力、スマホ OS、モバイルアプリ／サービス。無線プロトコルからユーザー向けアプリまで網羅。代表会議：MobiCom、MobiSys、SenSys。
  IoT:
    full_name:
      en: Internet of Things
      zh: 物联网
      ja: IoT（モノのインターネット）
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Networks of resource-constrained devices — embedded sensing/actuating, edge gateways, low-power protocols (LoRa, BLE, Zigbee), industrial IoT. Sits between Mobile, Networks, and CPS. Flagship venues: SenSys, IPSN, IoTDI.'
      zh: 资源受限设备组成的网络 —— 嵌入式感知/执行、边缘网关、低功耗协议（LoRa、BLE、Zigbee）、工业 IoT。处于 Mobile、Networks、CPS 之间。代表会议：SenSys、IPSN、IoTDI。
      ja: リソース制約のあるデバイス群のネットワーク —— 組込みセンシング／アクチュエーション、エッジゲートウェイ、低消費電力プロトコル（LoRa、BLE、Zigbee）、産業 IoT など。Mobile / Networks / CPS の中間領域。代表会議：SenSys、IPSN、IoTDI。
  Sensors:
    full_name:
      en: Sensor Networks
      zh: 传感器网络
      ja: センサネットワーク
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Networks of distributed sensing devices — sensor placement, low-power MAC, data aggregation, calibration, energy harvesting. Closely related to IoT but more focused on the sensing/communication layer. Flagship venues: SenSys, IPSN, EWSN.'
      zh: 分布式感知设备组成的网络 —— 传感器布置、低功耗 MAC、数据聚合、校准、能量收集等。与 IoT 紧密相关，但更聚焦感知与通信层。代表会议：SenSys、IPSN、EWSN。
      ja: 分散センシングデバイスのネットワーク —— センサ配置、低消費電力 MAC、データ集約、校正、エネルギーハーベスティングなど。IoT と密接だが、センシング／通信層により焦点を当てる。代表会議：SenSys、IPSN、EWSN。
  CPS:
    full_name:
      en: Cyber-Physical Systems
      zh: 信息物理系统
      ja: サイバーフィジカルシステム
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Tight coupling of computing with physical processes — control of cyber-physical loops, real-time systems, safety-critical software, autonomous vehicles, smart manufacturing. Flagship venues: ICCPS, HSCC, RTSS.'
      zh: 计算与物理过程深度耦合的系统 —— 控制回路、实时系统、安全关键软件、自动驾驶、智能制造等。代表会议：ICCPS、HSCC、RTSS。
      ja: コンピューティングと物理プロセスを密結合させる分野 —— 制御ループ、リアルタイムシステム、安全クリティカルソフトウェア、自動運転、スマート製造など。代表会議：ICCPS、HSCC、RTSS。
  SmartCity:
    full_name:
      en: Smart Cities
      zh: 智慧城市
      ja: スマートシティ
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Computing for urban-scale problems — traffic, energy grids, citizen services, urban sensing, mobility-as-a-service. Strong overlap with IoT, GIS, and Networks. Flagship venues: BuildSys, e-Energy, ISC2.'
      zh: 面向城市级问题的计算 —— 交通、能源电网、市民服务、城市感知、出行即服务等。与 IoT、GIS、Networks 大量交叉。代表会议：BuildSys、e-Energy、ISC2。
      ja: 都市規模の課題に取り組む分野 —— 交通、エネルギーグリッド、市民サービス、都市センシング、MaaS など。IoT / GIS / Networks と大きく重なる。代表会議：BuildSys、e-Energy、ISC2。
  GIS:
    full_name:
      en: Geographic Information Systems
      zh: 地理信息系统
      ja: 地理情報システム
    category:
      en: Interaction
      zh: 交互
      ja: インタラクション
    description:
      en: 'Geographic and spatial data — spatial indexing, map matching, trajectory mining, remote sensing, location-based services. Flagship venues: SIGSPATIAL, GeoInformatica, MDM.'
      zh: 地理与空间数据 —— 空间索引、地图匹配、轨迹挖掘、遥感、位置服务等。代表会议：SIGSPATIAL、GeoInformatica、MDM。
      ja: 地理空間データを扱う分野 —— 空間索引、マップマッチング、軌跡マイニング、リモートセンシング、位置情報サービスなど。代表会議：SIGSPATIAL、GeoInformatica、MDM。
  Networks:
    full_name:
      en: Computer Networks
      zh: 计算机网络
      ja: コンピュータネットワーク
    category:
      en: Systems
      zh: 系统
      ja: システム
    description:
      en: 'Data movement across machines — protocol design, routing, congestion control, datacenter networks, programmable switches, 5G/6G, P2P. Flagship venues: SIGCOMM, NSDI, INFOCOM.'
      zh: 研究机器之间的数据传输 —— 协议设计、路由、拥塞控制、数据中心网络、可编程交换机、5G/6G、P2P 等。代表会议：SIGCOMM、NSDI、INFOCOM。
      ja: マシン間のデータ転送を研究する分野 —— プロトコル設計、ルーティング、輻輳制御、データセンターネットワーク、プログラマブルスイッチ、5G/6G、P2P など。代表会議：SIGCOMM、NSDI、INFOCOM。
  Systems:
    full_name:
      en: Operating & Distributed Systems
      zh: 操作系统与分布式系统
      ja: OS・分散システム
    category:
      en: Systems
      zh: 系统
      ja: システム
    description:
      en: 'How software runs on hardware at scale — operating systems, distributed systems, virtualization, scheduling, storage stacks, cluster managers. "Plumbing of computing." Flagship venues: OSDI, SOSP, ATC, EuroSys.'
      zh: 研究软件如何在硬件上大规模运行 —— 操作系统、分布式系统、虚拟化、调度、存储栈、集群管理。可以理解为「计算的水管工」。代表会议：OSDI、SOSP、ATC、EuroSys。
      ja: ソフトウェアをハードウェア上で大規模に動かす分野 —— OS、分散システム、仮想化、スケジューリング、ストレージ、クラスタ管理。コンピューティングの「インフラ配管」。代表会議：OSDI、SOSP、ATC、EuroSys。
  Arch:
    full_name:
      en: Computer Architecture
      zh: 计算机体系结构
      ja: コンピュータアーキテクチャ
    category:
      en: Systems
      zh: 系统
      ja: システム
    description:
      en: 'Designing the hardware — CPUs, GPUs, accelerators, memory hierarchies, instruction sets, on-chip networks. The boundary between software and silicon. Flagship venues: ISCA, MICRO, HPCA, ASPLOS.'
      zh: 研究硬件本身的设计 —— CPU、GPU、加速器、内存层次、指令集、片上网络。软件与硅之间的边界。代表会议：ISCA、MICRO、HPCA、ASPLOS。
      ja: ハードウェアそのものの設計 —— CPU、GPU、アクセラレータ、メモリ階層、命令セット、オンチップネットワーク。ソフトウェアとシリコンの境界領域。代表会議：ISCA、MICRO、HPCA、ASPLOS。
  DB:
    full_name:
      en: Databases
      zh: 数据库
      ja: データベース
    category:
      en: Data
      zh: 数据
      ja: データ
    description:
      en: 'Managing structured data at scale — query optimization, transactions, indexing, distributed query execution, vector + graph DBs, ACID vs eventual consistency. Flagship venues: SIGMOD, VLDB, ICDE.'
      zh: 大规模管理结构化数据 —— 查询优化、事务、索引、分布式查询、向量数据库与图数据库、ACID vs 最终一致性。代表会议：SIGMOD、VLDB、ICDE。
      ja: 構造化データを大規模に管理する分野 —— クエリ最適化、トランザクション、索引、分散クエリ実行、ベクトル DB / グラフ DB、ACID vs 結果整合性。代表会議：SIGMOD、VLDB、ICDE。
  Security:
    full_name:
      en: Computer Security
      zh: 计算机安全
      ja: コンピュータセキュリティ
    category:
      en: Security
      zh: 安全
      ja: セキュリティ
    description:
      en: 'Protecting systems, data, and users — cryptography, network security, web/mobile security, malware analysis, side channels, formal verification of secure code. Flagship venues: IEEE S&P (Oakland), USENIX Security, CCS, NDSS.'
      zh: 保护系统、数据和用户的安全 —— 密码学、网络安全、Web/移动安全、恶意软件分析、侧信道、安全代码的形式化验证等。代表会议：IEEE S&P（Oakland）、USENIX Security、CCS、NDSS。
      ja: システム、データ、ユーザーを守る分野 —— 暗号、ネットワークセキュリティ、Web／モバイルセキュリティ、マルウェア解析、サイドチャネル、安全なコードの形式検証など。代表会議：IEEE S&P（Oakland）、USENIX Security、CCS、NDSS。
  SE:
    full_name:
      en: Software Engineering
      zh: 软件工程
      ja: ソフトウェア工学
    category:
      en: SE / PL
      zh: 软工 / 编程语言
      ja: ソフトウェア工学 / 言語
    description:
      en: 'Building maintainable, reliable software — testing, debugging, refactoring, requirements, team practices, mining software repositories, automated program repair. Flagship venues: ICSE, FSE, ASE.'
      zh: 研究如何构建可维护、可靠的软件 —— 测试、调试、重构、需求工程、团队实践、软件仓库挖掘、自动程序修复等。代表会议：ICSE、FSE、ASE。
      ja: 保守可能で信頼性の高いソフトウェアを作る分野 —— テスト、デバッグ、リファクタリング、要件、チーム実践、ソフトウェアリポジトリマイニング、自動プログラム修正など。代表会議：ICSE、FSE、ASE。
  PL:
    full_name:
      en: Programming Languages
      zh: 程序设计语言
      ja: プログラミング言語
    category:
      en: SE / PL
      zh: 软工 / 编程语言
      ja: ソフトウェア工学 / 言語
    description:
      en: 'How we describe computation — type systems, compilers, formal semantics, program analysis, language design (Rust, Haskell, etc.). Often heavy on theory + proofs. Flagship venues: PLDI, POPL, OOPSLA, ICFP.'
      zh: 研究如何描述计算 —— 类型系统、编译器、形式语义、程序分析、语言设计（Rust、Haskell 等）。通常理论与证明很重。代表会议：PLDI、POPL、OOPSLA、ICFP。
      ja: 計算をどう記述するかを研究する分野 —— 型システム、コンパイラ、形式意味論、プログラム解析、言語設計（Rust、Haskell など）。理論と証明が中心の論文が多い。代表会議：PLDI、POPL、OOPSLA、ICFP。
  Theory:
    full_name:
      en: Theoretical Computer Science
      zh: 理论计算机科学
      ja: 理論計算機科学
    category:
      en: Theory
      zh: 理论
      ja: 理論
    description:
      en: 'The math foundations of CS — algorithms, complexity, computability, cryptographic theory, randomness, combinatorial optimization. Proofs, not benchmarks. Flagship venues: STOC, FOCS, SODA.'
      zh: CS 的数学基础 —— 算法、复杂度、可计算性、密码学理论、随机化、组合优化等。看证明，不看 benchmark。代表会议：STOC、FOCS、SODA。
      ja: CS の数学的基礎 —— アルゴリズム、計算量、計算可能性、暗号理論、ランダム化、組合せ最適化など。ベンチマークではなく証明で勝負する分野。代表会議：STOC、FOCS、SODA。
  Graphics:
    full_name:
      en: Computer Graphics & Multimedia
      zh: 计算机图形学与多媒体
      ja: コンピュータグラフィックス・マルチメディア
    category:
      en: Graphics
      zh: 图形学
      ja: グラフィックス
    description:
      en: 'Generating and manipulating visual content — rendering, geometry processing, animation, shape modeling, visualization, multimedia systems. Flagship venues: SIGGRAPH, SIGGRAPH Asia, Eurographics, IEEE VIS.'
      zh: 生成与操作视觉内容 —— 渲染、几何处理、动画、形状建模、可视化、多媒体系统等。代表会议：SIGGRAPH、SIGGRAPH Asia、Eurographics、IEEE VIS。
      ja: 視覚コンテンツの生成と操作 —— レンダリング、ジオメトリ処理、アニメーション、形状モデリング、可視化、マルチメディアシステムなど。代表会議：SIGGRAPH、SIGGRAPH Asia、Eurographics、IEEE VIS。
  Robotics:
    full_name:
      en: Robotics
      zh: 机器人学
      ja: ロボティクス
    category:
      en: Robotics
      zh: 机器人
      ja: ロボティクス
    description:
      en: 'Building physical agents — motion planning, manipulation, locomotion, SLAM, visual servoing, learning-based control, human-robot interaction. Flagship venues: ICRA, IROS, RSS, CoRL.'
      zh: 研究物理智能体 —— 运动规划、操作、移动、SLAM、视觉伺服、基于学习的控制、人机交互等。代表会议：ICRA、IROS、RSS、CoRL。
      ja: 物理エージェントを作る分野 —— 動作計画、マニピュレーション、移動、SLAM、ビジュアルサーボ、学習ベースの制御、人とロボットの相互作用など。代表会議：ICRA、IROS、RSS、CoRL。
  Bio:
    full_name:
      en: Bioinformatics & Health
      zh: 生物信息学与健康
      ja: バイオインフォマティクス・医療
    category:
      en: Interdisciplinary
      zh: 交叉学科
      ja: 学際
    description:
      en: 'Computing applied to biology, health, and medicine — genomics, protein structure (AlphaFold), medical imaging analysis, clinical decision support, drug discovery. Flagship venues: ISMB/ECCB, RECOMB, AMIA, ICHI.'
      zh: 将计算应用于生物学、健康和医学 —— 基因组学、蛋白质结构（AlphaFold）、医学影像分析、临床决策支持、药物发现等。代表会议：ISMB/ECCB、RECOMB、AMIA、ICHI。
      ja: 計算を生物学・健康・医療に応用する分野 —— ゲノミクス、タンパク質構造（AlphaFold）、医療画像解析、臨床意思決定支援、創薬など。代表会議：ISMB/ECCB、RECOMB、AMIA、ICHI。
  Quantum:
    full_name:
      en: Quantum Computing
      zh: 量子计算
      ja: 量子コンピューティング
    category:
      en: Interdisciplinary
      zh: 交叉学科
      ja: 学際
    description:
      en: 'Algorithms and systems that exploit quantum mechanics — Shor / Grover algorithms, quantum error correction, quantum compilers, near-term NISQ devices. Still early-stage as a CS subfield. Flagship venues: QIP, TQC, IEEE Quantum Week.'
      zh: 利用量子力学的算法与系统 —— Shor / Grover 算法、量子纠错、量子编译器、近期 NISQ 设备等。作为 CS 子领域仍处于早期阶段。代表会议：QIP、TQC、IEEE Quantum Week。
      ja: 量子力学を利用したアルゴリズムとシステム —— Shor / Grover アルゴリズム、量子誤り訂正、量子コンパイラ、近未来の NISQ デバイスなど。CS 分野としてはまだ初期段階。代表会議：QIP、TQC、IEEE Quantum Week。
rankings:
  core_a_star:
    short: CORE A*
    full:
      en: CORE Ranking — A* (top tier)
      zh: CORE 排名 — A*（顶级）
      ja: CORE ランク — A*（トップ）
    source: Computing Research and Education Association of Australasia
    description:
      en: Flagship conferences considered the leading venues in their field. Globally recognized; typical acceptance rate 15–25%.
      zh: 在其领域内被认为是顶级旗舰会议。全球公认，典型录用率 15–25%。
      ja: 各分野でトップとされる旗艦会議。世界的に評価されており、採択率は通常 15–25%。
    url: https://portal.core.edu.au/conf-ranks/
  core_a:
    short: CORE A
    full:
      en: CORE Ranking — A
      zh: CORE 排名 — A
      ja: CORE ランク — A
    source: Computing Research and Education Association of Australasia
    description:
      en: Excellent venues just below flagship status; highly respected within their research community.
      zh: 仅次于旗舰级别的优秀会议，在所属研究社区中享有很高声誉。
      ja: 旗艦に次ぐ優れた会議。研究コミュニティ内で高く評価されている。
    url: https://portal.core.edu.au/conf-ranks/
  core_b:
    short: CORE B
    full:
      en: CORE Ranking — B
      zh: CORE 排名 — B
      ja: CORE ランク — B
    source: Computing Research and Education Association of Australasia
    description:
      en: Good venues with solid publication quality and reasonable acceptance rates.
      zh: 论文质量稳定、录用率适中的良好会议。
      ja: 出版品質が安定し、採択率も妥当な良質な会議。
    url: https://portal.core.edu.au/conf-ranks/
  core_c:
    short: CORE C
    full:
      en: CORE Ranking — C
      zh: CORE 排名 — C
      ja: CORE ランク — C
    source: Computing Research and Education Association of Australasia
    description:
      en: Ranked venues, often more specialized or regional in scope.
      zh: 已被排名的会议，通常更专门或更具地域性。
      ja: ランク付けされた会議。専門分野や地域に特化していることが多い。
    url: https://portal.core.edu.au/conf-ranks/
  ccf_a:
    short: CCF A
    full:
      en: CCF Ranking — A (top tier)
      zh: CCF 推荐 — A（顶级）
      ja: CCF ランク — A（トップ）
    source: China Computer Federation
    description:
      en: Top-tier international venues per CCF. Rankings are field-specific and used heavily for PhD graduation and faculty evaluation in Chinese universities.
      zh: CCF 推荐的国际顶级会议。按方向分级，中国高校博士毕业与教师考核中广泛使用。
      ja: CCF が推薦するトップティアの国際会議。分野別に格付けされており、中国の大学では博士号取得や教員評価で重視される。
    url: https://www.ccf.org.cn/Academic_Evaluation/By_category/
  ccf_b:
    short: CCF B
    full:
      en: CCF Ranking — B
      zh: CCF 推荐 — B
      ja: CCF ランク — B
    source: China Computer Federation
    description:
      en: Second-tier respected venues per CCF.
      zh: CCF 推荐的二级会议，业界口碑良好。
      ja: CCF 推薦の第二ティア会議。コミュニティで広く認知されている。
    url: https://www.ccf.org.cn/Academic_Evaluation/By_category/
  ccf_c:
    short: CCF C
    full:
      en: CCF Ranking — C
      zh: CCF 推荐 — C
      ja: CCF ランク — C
    source: China Computer Federation
    description:
      en: Third-tier credible venues per CCF.
      zh: CCF 推荐的三级会议，质量可靠。
      ja: CCF 推薦の第三ティア会議。一定の信頼性を持つ。
    url: https://www.ccf.org.cn/Academic_Evaluation/By_category/
  thu_a:
    short: THU A
    full:
      en: Tsinghua CS Paper List — A
      zh: 清华 CS 论文清单 — A
      ja: 清華大学 CS 論文リスト — A
    source: Tsinghua University Department of Computer Science
    description:
      en: Tsinghua's internal conference list categorizing venues by tier for graduation requirements. Overlaps with but differs from CCF.
      zh: 清华大学计算机系内部使用的会议分级清单，用于毕业要求。与 CCF 部分重叠但不完全一致。
      ja: 清華大学計算機学科の内部会議リスト。卒業要件用にティア分けされており、CCF とは一部重なるが異なる。
concepts:
  track:
    full:
      en: Submission track
      zh: 投稿 Track
      ja: 投稿トラック
    description:
      en: 'Conferences often accept submissions in several parallel tracks — e.g.

        full papers, late-breaking work, posters, demos, industrial papers,

        workshops. Each track has its own deadlines, page limits, review

        process, and acceptance rate. Picking the right track matters — a

        strong submission to the wrong track is often rejected as a category

        mismatch. The deadlines shown for this card cover every track this

        venue runs.

        '
      zh: '会议通常会同时开放多个 track 投稿 —— full papers、late-breaking work、

        poster、demo、工业界论文、workshop 等等。每个 track 有各自的截止时间、

        篇幅限制、评审流程和录用率。选对 track 很重要，质量再高的论文如果投错

        track 也会因「类别不符」被拒。这张卡片列出了该会议所有 track 的截止时间。

        '
      ja: '会議では通常、フルペーパー、Late-breaking、ポスター、デモ、産業論文、

        ワークショップなど複数のトラックが並行して投稿を受け付けています。

        各トラックには固有の締切、ページ数制限、査読プロセス、採択率があります。

        適切なトラックを選ぶことが重要で、強い論文でも誤ったトラックに投稿すると

        カテゴリ不一致でリジェクトされることがあります。このカードに表示されている

        締切は、その会議が運営しているすべてのトラックを網羅しています。

        '
  round:
    full:
      en: Submission round (or cycle)
      zh: 投稿轮次（cycle）
      ja: 投稿サイクル（ラウンド）
    description:
      en: 'Some venues split each track into multiple submission rounds per year

        so authors get multiple chances. KDD has Feb + Aug cycles; ASPLOS has

        spring/summer/fall rounds; IMWUT and PVLDB run monthly. Missing one

        round just means waiting for the next — it is not the end of the year.

        '
      zh: '部分会议把同一个 track 拆成多个轮次（cycle），让作者有多次投稿机会。

        例如 KDD 有 2 月和 8 月两轮、ASPLOS 有春/夏/秋三轮、IMWUT 和 PVLDB

        每月一轮。错过一轮只是要等下一轮，不等于错过全年。

        '
      ja: '一部の会議は同じトラックを年に複数回のサイクルに分け、著者に複数回の

        投稿機会を提供します。KDD は 2 月／8 月の 2 サイクル、ASPLOS は春／夏／秋、

        IMWUT や PVLDB は毎月サイクルがあります。1 サイクルを逃しても次回を

        待てばよく、その年が終わったわけではありません。

        '
track_kinds:
  papers:
    full:
      en: Main research papers
      zh: 主会论文
      ja: メイン研究論文
    description:
      en: 'The conference''s main full-length research papers — typically 8–15

        pages plus references, double-blind reviewed, with the highest

        visibility and citation potential. This is the "real" track most

        people mean when they say a paper got into the venue.

        '
      zh: '会议主会的 full-length 论文 —— 通常 8–15 页正文加参考文献，

        采用双盲评审，曝光度和引用潜力最高。大家说"中了某会议"时一般指的就是这个 track。

        '
      ja: '会議のメインとなるフル論文。通常 8–15 ページ＋参考文献、ダブルブラインド査読で、

        最も注目を集め引用されるトラック。「ある会議に通った」と言われるとき、

        多くの場合この本会議トラックを指します。

        '
  journal:
    full:
      en: Journal track
      zh: 期刊 Track
      ja: ジャーナルトラック
    description:
      en: 'Papers reviewed and published through an associated journal — TVCG

        for IEEE VR / ISMAR, IMWUT (PACM IMWUT) for UbiComp, PVLDB for VLDB,

        PACM HCI for CSCW / CHI engineering. Longer review cycles than the

        conference track and usually a "major revision" option in place of

        a binary accept/reject. Accepted papers are presented at the linked

        conference but are formally journal publications.

        '
      zh: '通过会议关联期刊投稿与出版的 track —— 如 IEEE VR/ISMAR 的 TVCG、UbiComp

        的 IMWUT (PACM IMWUT)、VLDB 的 PVLDB、CSCW/CHI 的 PACM HCI。审稿周期比

        会议 track 更长，通常允许"major revision"而非简单的接收/拒绝。论文最终

        在期刊正式发表，但会在配套会议上进行口头报告。

        '
      ja: '提携ジャーナルを通じて査読・出版されるトラック。IEEE VR/ISMAR の TVCG、

        UbiComp の IMWUT (PACM IMWUT)、VLDB の PVLDB、CSCW/CHI の PACM HCI など。

        会議トラックより査読期間が長く、accept/reject ではなく「major revision」

        オプションが用意されています。採択論文は併設会議で発表されますが、

        正式にはジャーナル論文として出版されます。

        '
  posters:
    full:
      en: Posters / Late-breaking work
      zh: 海报 / 阶段性成果
      ja: ポスター・速報
    description:
      en: 'Short-format submissions (1–4 pages) for emerging work, preliminary

        results, or late-breaking findings. Reviewed by a smaller PC and

        presented as a poster session at the venue. Lower bar than full

        papers but still archival in the proceedings — useful for getting

        a paper trail on in-progress work.

        '
      zh: '短篇投稿（1–4 页），用于新兴方向、初步结果或阶段性发现。由较小的程序

        委员会评审，并在会议上以海报形式展示。门槛低于 full paper，但同样收录

        于会议论文集 —— 适合给正在进行中的工作留下书面记录。

        '
      ja: '新規方向や予備的成果、最近のブレークスルーを対象とした短い投稿（1–4 ページ）。

        小規模な PC によって査読され、会議でポスター発表されます。フルペーパーより

        基準は低いものの、論文集に収録されるため、進行中の研究の足跡を残すのに役立ちます。

        '
  demos:
    full:
      en: Demonstrations
      zh: Demo 演示
      ja: デモ
    description:
      en: 'Live or recorded demos of working systems, prototypes, or research

        artifacts. Submission is usually 2–4 pages plus a short video.

        Reviewed for technical novelty and audience interest. Great for

        showing off engineering / UI work that doesn''t fit a research paper.

        '
      zh: '现场或录制的系统、原型或研究 artifact 演示。投稿一般是 2–4 页加上

        一段短视频。评审重点是技术新颖度和现场受众兴趣。适合展示难以写成

        论文的工程或 UI 工作。

        '
      ja: '実働システム・プロトタイプ・研究成果物のライブまたは録画デモ。投稿は

        通常 2–4 ページに短い動画を添付します。技術的新規性と聴衆の関心を基準に

        査読されます。論文化が難しいエンジニアリング・UI 成果を見せるのに最適。

        '
  workshops:
    full:
      en: Workshops
      zh: Workshop
      ja: ワークショップ
    description:
      en: 'Topical events co-located with the main conference. There are two

        different deadlines: the workshop-PROPOSAL deadline (for organisers

        proposing a workshop topic) and the workshop-PAPER deadline (for

        authors submitting to an accepted workshop). Each workshop runs its

        own CFP with its own quality bar.

        '
      zh: '与主会同址举办的专题活动。注意有两个不同的截止日期：workshop 提案

        deadline（提案新的 workshop 主题）和 workshop 论文 deadline（向已

        立项的 workshop 投稿）。每个 workshop 都有自己的 CFP 与质量门槛。

        '
      ja: '本会議と同会場で開催されるトピック特化イベント。締切は二段階：

        ワークショップ提案締切（主催者がトピックを提案する）と、ワークショップ

        論文締切（採択されたワークショップへ投稿する）。各ワークショップは

        独自の CFP と品質基準を持ちます。

        '
  tutorials:
    full:
      en: Tutorials
      zh: Tutorial 教程
      ja: チュートリアル
    description:
      en: 'Half- or full-day instructional sessions on a focused topic. The

        submission is a tutorial proposal (motivation, outline, presenter

        bio). Accepted tutorials run before or after the main program.

        A good way to establish topic expertise without a paper.

        '
      zh: '围绕特定主题的半天或全天教学环节。投稿是 tutorial 提案（动机、大纲、

        讲者简介）。被接收的 tutorial 会在主会议程之前或之后举行。是不写论文

        也能建立专题影响力的好方式。

        '
      ja: '特定トピックに焦点を当てた半日または終日の教育セッション。投稿は

        チュートリアル提案（動機、概要、講師経歴）です。採択されたチュートリアル

        は本会議の前後に開催されます。論文なしで専門性を示せる良い場です。

        '
  doctoral:
    full:
      en: Doctoral consortium / symposium
      zh: 博士论坛 (Doctoral Consortium)
      ja: 博士論文コンソーシアム
    description:
      en: 'A forum for PhD students to present in-progress dissertation work,

        get structured feedback from senior researchers, and meet peers.

        Submission is typically a short research statement plus an advisor

        letter. PhD-students-only; great for early-stage research direction.

        '
      zh: '面向博士生的论坛，可展示进行中的博士论文工作，从资深研究者获取结构化

        反馈并结识同行。投稿通常是简短的研究陈述 + 导师推荐信。仅限博士生，

        非常适合早期研究方向的打磨。

        '
      ja: '博士課程の学生が進行中の博士論文研究を発表し、シニア研究者から体系的

        フィードバックを受け、同世代と交流するためのフォーラム。投稿は通常

        短い研究ステートメントと指導教員の推薦状。博士課程学生限定で、

        研究方向の初期段階に最適。

        '
  industry:
    full:
      en: Industry / Applied track
      zh: 工业界 / 应用 Track
      ja: 産業・応用トラック
    description:
      en: 'A track for applied research papers from industry. Novelty bar is

        relaxed in exchange for stronger emphasis on real-world deployment,

        scale, and measured impact. Distinct CFP from the main research

        track but co-published in the same proceedings (e.g. KDD ADS,

        SIGSPATIAL Industrial, SIGMOD Industry).

        '
      zh: '面向工业界应用研究的 track。新颖度门槛较低，但更强调真实部署、规模与

        可量化影响。CFP 独立于主研究 track，但会一同收录在会议论文集中

        （如 KDD ADS、SIGSPATIAL Industrial、SIGMOD Industry）。

        '
      ja: '産業界からの応用研究論文向けトラック。新規性の基準は緩く、その代わり

        実環境への展開、スケール、定量的インパクトが重視されます。本研究トラックとは

        独立した CFP ですが、同じ論文集に掲載されます（例：KDD ADS、SIGSPATIAL Industrial、

        SIGMOD Industry）。

        '
  special:
    full:
      en: Special session
      zh: 特别 Session
      ja: 特別セッション
    description:
      en: 'A focused mini-track on a specific topic curated by guest organisers

        within the main conference. The CFP is separate from the main track

        and the review process / quality bar can differ. Common at IEEE

        BigData (e.g. Dataspaces/DFFT) and IEEE SMC.

        '
      zh: '由特邀组织者在主会内策划的某一专题 mini-track。CFP 独立于主 track，

        评审流程与质量门槛可能有所不同。常见于 IEEE BigData（如 Dataspaces/DFFT）

        和 IEEE SMC。

        '
      ja: 'ゲスト主催者が本会議内で企画する特定トピックのミニトラック。CFP は本トラック

        とは別で、査読プロセスや品質基準が異なる場合があります。IEEE BigData（例：

        Dataspaces/DFFT）や IEEE SMC で一般的です。

        '
  wip:
    full:
      en: Work-in-progress / short paper
      zh: 进行中工作 / 短论文
      ja: WIP・ショートペーパー
    description:
      en: 'Short-format (2–6 pages) submissions for in-progress or preliminary

        work. Lighter review process, presented as posters or short talks.

        Useful for getting early feedback before committing the same idea

        to a full-paper effort.

        '
      zh: '短篇投稿（2–6 页），用于进行中或初步的工作。评审更轻量，以海报或

        短演讲形式展示。适合在投递 full paper 前获取早期反馈。

        '
      ja: '進行中または予備的な研究向けの短い投稿（2–6 ページ）。査読は軽めで、

        ポスターまたはショート発表で発表されます。フルペーパーに投じる前に

        早期フィードバックを得るのに有用。

        '
  src:
    full:
      en: Student research competition / contest
      zh: 学生研究竞赛
      ja: 学生研究コンペティション
    description:
      en: 'Student-only track where individuals or small teams present early

        research or innovative projects in competition format. Usually

        capped at undergrad / masters / early-PhD level, often with travel

        grants or cash prizes.

        '
      zh: '仅限学生参加的 track，以竞赛形式让个人或小团队展示早期研究或创新项目。

        通常限定本科 / 硕士 / 博士早期，常附带旅行资助或现金奖励。

        '
      ja: '学生限定のトラックで、個人または小チームが初期研究や革新的プロジェクトを

        コンペティション形式で発表します。通常は学部・修士・博士初期に限定され、

        旅費助成や賞金が用意されていることが多いです。

        '
  panel:
    full:
      en: Panel / meet-up / interactive
      zh: Panel / 见面会 / 互动环节
      ja: パネル・ミートアップ
    description:
      en: 'Non-paper formats — moderated panel discussions, informal meet-ups,

        Birds of a Feather, "Real-Time Live!" demos. Submission is a

        proposal (topic plus panellists or format). No archival paper.

        '
      zh: '非论文形式 —— 包括主持人引导的 panel 讨论、Birds of a Feather 见面会、

        「Real-Time Live!」演示等。投稿是一份提案（主题 + 嘉宾或形式）。不会

        归档为论文。

        '
      ja: '論文以外の形式。司会付きパネルディスカッション、Birds of a Feather、

        「Real-Time Live!」デモなど。投稿は提案書（テーマと登壇者・形式）です。

        論文として保存されることはありません。

        '
  vision:
    full:
      en: Vision / position / blue-sky
      zh: 愿景 / 立场 / Blue-sky 论文
      ja: ビジョン・ポジション・将来展望
    description:
      en: 'Forward-looking papers proposing new research agendas, controversial

        positions, or "blue-sky" ideas. The community values novelty of

        framing over rigorous empirical evaluation. Short format, typically

        4–6 pages.

        '
      zh: '前瞻性论文，用于提出新的研究议程、有争议的立场或「blue-sky」想法。

        社区更看重视角的新颖度，而非严谨的实证评估。短篇格式，通常 4–6 页。

        '
      ja: '新しい研究アジェンダ、論争を呼ぶ立場、または「ブルースカイ」な構想を

        提案する将来志向の論文。コミュニティは厳密な実証評価よりも問題設定の

        新規性を重視します。短い形式で通常 4–6 ページ。

        '
deadline_kinds:
  abstract:
    full:
      en: Abstract registration
      zh: 摘要预注册
      ja: アブストラクト事前登録
    description:
      en: Mandatory pre-registration of title, authors, and abstract before the full paper deadline. Common at CHI, UIST, SIGCOMM. Miss this and you cannot submit the full paper.
      zh: 在 full paper 截止前必须先注册标题、作者与摘要。常见于 CHI、UIST、SIGCOMM 等。错过此项就无法投递正文。
      ja: フルペーパー締切の前に、タイトル・著者・アブストラクトを事前登録する必須ステップ。CHI、UIST、SIGCOMM などで一般的。これを逃すとフルペーパーを提出できません。
  paper:
    full:
      en: Full paper submission
      zh: 正文提交
      ja: フルペーパー提出
    description:
      en: The main submission deadline.
      zh: 主要的论文提交截止时间。
      ja: メインの論文投稿締切。
  rebuttal_start:
    full:
      en: Rebuttal period start
      zh: Rebuttal 阶段开始
      ja: リバタル期間開始
    description:
      en: Authors receive initial reviews and may respond.
      zh: 作者收到初步评审意见，可进行回应。
      ja: 著者が初回レビューを受け取り、回答できる期間の開始。
  rebuttal_end:
    full:
      en: Rebuttal period end
      zh: Rebuttal 阶段结束
      ja: リバタル期間終了
    description:
      en: Author response must be submitted by this time.
      zh: 作者回应必须在此前提交完毕。
      ja: この時点までに著者応答を提出する必要があります。
  notification:
    full:
      en: Acceptance notification
      zh: 录用通知
      ja: 採択通知
    description:
      en: Final accept/reject decision sent to authors.
      zh: 最终的接收 / 拒绝结果通知作者。
      ja: 最終的な採択・不採択の結果が著者に通知されます。
  camera_ready:
    full:
      en: Camera-ready deadline
      zh: Camera-ready 终稿截止
      ja: カメラレディ締切
    description:
      en: Final formatted version of accepted papers due to publisher.
      zh: 已录用论文的最终排版版本提交给出版方的截止时间。
      ja: 採択論文の最終版（書式適用済）を出版社に提出する締切。
  proposal:
    full:
      en: Workshop/track proposal
      zh: Workshop / Track 提案截止
      ja: ワークショップ・トラック提案
    description:
      en: Deadline for proposing a new workshop or special track at the conference.
      zh: 提交新 workshop 或专题 track 提案的截止时间。
      ja: 新しいワークショップや特別トラックを提案する締切。
  commitment:
    full:
      en: ARR commitment deadline
      zh: ARR Commitment 截止
      ja: ARR コミットメント締切
    description:
      en: For ACL-family venues using the ACL Rolling Review (ARR). After your ARR submission is reviewed, you must "commit" it to a specific venue (ACL, EMNLP, NAACL, EACL) by this date for that venue to consider accepting it.
      zh: 用于使用 ACL Rolling Review (ARR) 的 ACL 系会议。ARR 评审完成后，必须在此日期前把论文「commit」到具体会议（ACL、EMNLP、NAACL、EACL 等），才能进入对应会议的录用流程。
      ja: ACL Rolling Review (ARR) を採用する ACL 系会議向けの締切。ARR レビューが終わった論文は、この期日までに特定の会議（ACL、EMNLP、NAACL、EACL など）へ「commit」する必要があります。

# -----------------------------------------------------------------------------
# Jargon — abbreviations and phrases you'll encounter in CS conference CFPs,
# review systems, and PC emails. Grouped roughly by category but flat-keyed for
# simple rendering. Each entry has `full` (expansion) and `description`.
# -----------------------------------------------------------------------------
jargon:
  AoE:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Anywhere on Earth (UTC−12:00)
      zh: 地球上任意地点（UTC−12:00）
      ja: Anywhere on Earth（地球上のどこか, UTC−12:00）
    description:
      en: A timezone used for paper deadlines. A deadline "11:59 PM AoE on March 1" is final once midnight has passed on Baker Island (the last inhabited point west of the date line). In practice, that gives you until ~1pm UTC the next day.
      zh: 用于论文截止时间的时区。「3 月 1 日 23:59 AoE」意思是只要地球上还有任何地方仍是 3 月 1 日，就还在截止之前。实际上相当于次日 UTC 13:00 左右。
      ja: 論文締切に使われるタイムゾーン。「3月1日 23:59 AoE」は、地球上のどこかがまだ3月1日である限り締切前とみなされます。実質的には翌日のUTC 13:00頃が真の締切。
  CFP:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Call for Papers
      zh: 论文征集（Call for Papers）
      ja: 論文募集（Call for Papers）
    description:
      en: The official document describing what a venue is looking for this year — topics in scope, deadlines, page limit, format template, dual-submission policy, awards, etc. Always the source of truth over secondary sites.
      zh: 会议官方发布的征稿文档，列出当年的主题范围、各项截止时间、篇幅限制、模板格式、是否允许双投、奖项等。一切以 CFP 为准，第三方网站只是参考。
      ja: 会議が公式に公開する募集要項。テーマの範囲、各種締切、ページ数制限、テンプレート、二重投稿の可否、賞などが書かれています。常に CFP が一次情報で、第三者サイトは参考程度に。
  abstract_reg:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Abstract registration deadline
      zh: 摘要注册截止
      ja: アブストラクト登録締切
    description:
      en: A "soft" pre-deadline (often 1 week before full paper) where you submit title + abstract + authors. Used to assign reviewers in advance. Missing it usually blocks the full submission — even if the paper is ready.
      zh: 在论文提交截止前的「软」截止时间（通常提前一周），要求先提交标题、摘要和作者名单，便于会议提前分配评审。错过这个时间通常就无法提交全文，即使论文已经写完。
      ja: 論文本体の締切前にある「ソフト」な締切（通常1週間前）。タイトル・要旨・著者を先に登録し、査読者の割り当てに使われます。これを逃すと、論文が完成していても本投稿できないことが多いです。
  rebuttal:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Rebuttal / author response
      zh: 反驳 / 作者回应
      ja: リバッタル / 著者反論
    description:
      en: A short window (typically 5–10 days, with a strict word limit) where authors can respond to reviewers' factual mistakes or misunderstandings. You generally cannot promise new experiments — only clarify what's already in the paper.
      zh: 评审完成后给作者的短暂回应窗口（通常 5–10 天，字数严格受限），用于回应评审中的事实错误或误解。一般不允许承诺新的实验，只能澄清论文中已有的内容。
      ja: 査読後に著者が短期間（通常5〜10日、厳しい字数制限あり）反論できる期間。基本的に新規実験の約束はできず、論文内に既にある内容の補足説明のみ可能です。
  rr:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: R&R — Revise and Resubmit
      zh: R&R —— 修订重投
      ja: R&R — 改訂再投稿
    description:
      en: Instead of accept/reject, the paper is conditionally returned with required changes. Used by CHI, journals, and increasingly by ACM TOSEM/TSE-style venues. You get more time and feedback than a rebuttal, but resubmission is not auto-accept.
      zh: 不是直接录用或拒稿，而是有条件返修。CHI、各种期刊以及越来越多 ACM TOSEM/TSE 类会议都采用这种机制。比 rebuttal 给的时间和反馈更多，但重投不等于录用。
      ja: 採択/不採択ではなく、条件付きで返却され改訂を求められる方式。CHI、各種ジャーナル、ACM TOSEM/TSE 系の会議で増加中。リバッタルより時間も情報も多いですが、再投稿しても採択は保証されません。
  desk_reject:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Desk reject
      zh: 编辑直拒（Desk Reject）
      ja: デスクリジェクト
    description:
      en: A rejection by the chairs before the paper enters peer review. Common causes — out of scope, overlength, anonymity violation, missing required sections, dual submission, formatting issues. Not appealable.
      zh: 论文还未进入正式评审就被主席直接拒稿。常见原因：超出范围、超页、违反匿名、缺少必需章节、双投、格式问题等。一般不可申诉。
      ja: 査読に入る前にチェアが直接リジェクトする処分。主な理由：スコープ外、ページ超過、匿名違反、必須項目欠落、二重投稿、書式不備など。基本的に異議申し立て不可。
  conditional_accept:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Conditional accept / shepherding
      zh: 有条件录用 / Shepherd
      ja: 条件付き採択 / シェパード
    description:
      en: The paper is accepted provided you make specific changes that a "shepherd" (one of the reviewers) signs off on before camera-ready. Common in systems venues (OSDI, SOSP, NSDI).
      zh: 论文有条件录用，要求按指定意见修改并由一位「shepherd」（指定评审）在 camera-ready 前确认通过。在系统类会议（OSDI、SOSP、NSDI）中很常见。
      ja: 指定された修正を行い、「シェパード」役のレビュアーが camera-ready 前に承認することを条件とする採択。システム系会議（OSDI、SOSP、NSDI）でよくあります。
  meta_review:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Meta-review
      zh: 元评审 / 综合评审
      ja: メタレビュー
    description:
      en: A summary review from the Area Chair (AC) that synthesizes the individual reviews and explains the final decision. Usually the most actionable feedback for authors of a rejected paper.
      zh: 由 Area Chair（AC）写的综合评审，把各位 reviewer 的意见汇总并解释最终决定。对于被拒论文，这通常是最有参考价值的意见。
      ja: Area Chair（AC）が各レビューを統合し最終判断の理由を説明する総括レビュー。リジェクトされた論文にとっては最も具体的なフィードバック源となることが多いです。
  double_blind:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Double-blind review
      zh: 双盲评审
      ja: ダブルブラインド査読
    description:
      en: Both authors and reviewers are anonymous to each other. You must remove names, affiliations, self-references like "in our previous work [3]", and acknowledgements. Most CS venues are now double-blind.
      zh: 作者和评审互相匿名。提交时需去除姓名、单位、形如「in our previous work [3]」的自指、以及致谢部分。目前大多数 CS 会议都是双盲。
      ja: 著者と査読者が互いに匿名となる方式。投稿時には名前・所属・「in our previous work [3]」のような自己引用・謝辞などを削除する必要があります。現在ほとんどの CS 会議で採用。
  single_blind:
    category:
      en: Review process
      zh: 评审流程
      ja: 査読プロセス
    full:
      en: Single-blind review
      zh: 单盲评审
      ja: シングルブラインド査読
    description:
      en: Reviewers see who the authors are; authors don't see reviewer names. Less common in CS today (mostly survives in some IEEE journals and a few legacy venues).
      zh: 评审能看到作者身份，作者看不到评审身份。在 CS 中已不太常见（主要还存在于部分 IEEE 期刊和少数老牌会议）。
      ja: 査読者は著者を知っているが、著者は査読者を知らない方式。現在の CS では少数派（一部の IEEE ジャーナルや一部の伝統的会議に残るのみ）。
  arxiv_policy:
    category:
      en: Policy
      zh: 政策
      ja: ポリシー
    full:
      en: Preprint / arXiv policy
      zh: 预印本 / arXiv 政策
      ja: プレプリント / arXiv ポリシー
    description:
      en: Whether you may post the submitted paper on arXiv before/during review. Varies wildly — CVPR allows it, some ACL venues have an anonymity window, some HCI venues forbid it entirely. Always check the CFP.
      zh: 投稿期间是否允许把论文挂到 arXiv 等预印本平台，每个会议规则差别很大。CVPR 允许；部分 ACL 会议有匿名窗口期；部分 HCI 会议完全禁止。一定要看 CFP。
      ja: 投稿中の論文を arXiv などに公開してよいかどうか。会議ごとに大きく異なります。CVPR は許可、一部の ACL 系は匿名期間あり、一部の HCI 系は完全禁止。必ず CFP を確認。
  dual_submission:
    category:
      en: Policy
      zh: 政策
      ja: ポリシー
    full:
      en: Dual / double submission
      zh: 双投 / 一稿多投
      ja: 二重投稿
    description:
      en: Submitting substantially the same paper to two venues simultaneously. Almost universally forbidden — leads to desk reject and sometimes a multi-year ban from both venues. Workshops are usually exempt; check the CFP.
      zh: 同一篇论文同时投到两个会议。几乎所有会议都禁止，通常会被两个会议同时桌拒，甚至禁投数年。Workshop 一般可以例外，以 CFP 为准。
      ja: 実質的に同じ論文を複数会議に同時投稿すること。ほとんどの会議で禁止。両方からデスクリジェクト＋数年間の投稿禁止となることも。ワークショップは例外が多いので CFP を確認。
  coi:
    category:
      en: Policy
      zh: 政策
      ja: ポリシー
    full:
      en: CoI — Conflict of Interest
      zh: 利益冲突（Conflict of Interest）
      ja: 利益相反（Conflict of Interest）
    description:
      en: Reviewers who have collaborated, advised, or shared an institution with an author within the last N years (often 2–4) cannot review the paper. Authors usually declare CoIs in the submission system upfront.
      zh: 与作者在过去 N 年（通常 2–4 年）有过合作、师生关系或同机构关系的人不能担任评审。作者通常需要在提交系统中预先声明 CoI。
      ja: 著者と過去 N 年（通常2〜4年）以内に共著・指導・同所属関係があったレビュアーは査読不可。投稿システムで著者があらかじめ CoI を申告する形式が一般的。
  openreview:
    category:
      en: Submission systems
      zh: 投稿系统
      ja: 投稿システム
    full:
      en: OpenReview
      zh: OpenReview
      ja: OpenReview
    description:
      en: Open-source submission + reviewing platform built at NYU, used by ICLR, NeurIPS (since 2018), COLM, TMLR, and many others. Reviews may be public, anonymous, or semi-public depending on venue settings.
      zh: 由 NYU 开发的开源投稿与评审平台，被 ICLR、NeurIPS（自 2018 起）、COLM、TMLR 等大量会议采用。评审可以公开、匿名或半公开，由各会议设置决定。
      ja: NYU が開発したオープンソースの投稿・査読プラットフォーム。ICLR、NeurIPS（2018年以降）、COLM、TMLR ほか多数で採用。査読の公開度は会議の設定によって変わります。
  hotcrp:
    category:
      en: Submission systems
      zh: 投稿系统
      ja: 投稿システム
    full:
      en: HotCRP
      zh: HotCRP
      ja: HotCRP
    description:
      en: Lightweight conference review system written by Eddie Kohler, widely used by systems and networking venues (SIGCOMM, OSDI, NSDI, ASPLOS, MobiCom). PDF only, simple UI, no public discussion.
      zh: Eddie Kohler 开发的轻量级会议评审系统，系统与网络类会议（SIGCOMM、OSDI、NSDI、ASPLOS、MobiCom）广泛使用。只支持 PDF，界面简洁，不支持公开讨论。
      ja: Eddie Kohler 製の軽量会議査読システム。システム/ネットワーク系会議（SIGCOMM、OSDI、NSDI、ASPLOS、MobiCom）で広く採用。PDFのみ、シンプルなUI、公開議論なし。
  easychair:
    category:
      en: Submission systems
      zh: 投稿系统
      ja: 投稿システム
    full:
      en: EasyChair
      zh: EasyChair
      ja: EasyChair
    description:
      en: Long-running general-purpose conference management platform. Used by thousands of venues from small workshops to large IEEE conferences. Functional but UI is dated.
      zh: 老牌通用会议管理平台，从小型 workshop 到大型 IEEE 会议都在用。功能齐全，但界面比较老旧。
      ja: 長く使われている汎用会議管理プラットフォーム。小規模ワークショップから大型 IEEE 会議まで多数の会議で利用。機能は十分だが UI はやや古い。
  cmt:
    category:
      en: Submission systems
      zh: 投稿系统
      ja: 投稿システム
    full:
      en: CMT — Microsoft Conference Management Toolkit
      zh: CMT —— 微软会议管理系统
      ja: CMT — Microsoft 会議管理ツールキット
    description:
      en: Microsoft-hosted submission system, used by CVPR, ECCV, AAAI, ICML and others. Free for academic conferences. Supports supplementary uploads, rebuttal, AC discussion.
      zh: 微软提供的投稿系统，CVPR、ECCV、AAAI、ICML 等都在用，学术会议免费使用。支持补充材料上传、rebuttal、AC 讨论等流程。
      ja: Microsoft が提供する投稿システム。CVPR、ECCV、AAAI、ICML などで採用。学術会議は無料利用可。補足資料アップロード、リバッタル、AC 議論をサポート。
  pc:
    category:
      en: Roles
      zh: 角色
      ja: 役割
    full:
      en: PC — Program Committee
      zh: PC —— 程序委员会
      ja: PC — プログラム委員会
    description:
      en: The reviewers responsible for evaluating submissions. Hierarchies vary — SPC (Senior PC) and AC (Area Chair) sit above regular PC members and write meta-reviews.
      zh: 负责评审论文的委员会成员。各会议层级不同：SPC（Senior PC）和 AC（Area Chair）位于普通 PC 之上，负责撰写综合评审。
      ja: 投稿論文を査読する委員会のメンバー。階層構造は会議ごとに異なり、SPC（Senior PC）や AC（Area Chair）は通常の PC の上位に位置し、メタレビューを担当します。
  ac:
    category:
      en: Roles
      zh: 角色
      ja: 役割
    full:
      en: AC — Area Chair
      zh: AC —— Area Chair（领域主席）
      ja: AC — エリアチェア
    description:
      en: A senior researcher responsible for a topic area within a conference. Assigns reviewers, leads discussion, writes the meta-review, and recommends accept/reject to the program chairs.
      zh: 负责某一研究方向的资深研究者。分配评审、主持讨论、撰写综合评审，并向 Program Chair 推荐录用或拒稿。
      ja: 会議内のあるテーマ領域を担当する上級研究者。査読者を割り当て、議論をリードし、メタレビューを書き、プログラムチェアに採否を提案します。
  pc_chair:
    category:
      en: Roles
      zh: 角色
      ja: 役割
    full:
      en: Program Chair / General Chair
      zh: 程序主席 / 大会主席
      ja: プログラムチェア / ジェネラルチェア
    description:
      en: Program Chairs run the review process (build the PC, set deadlines, make final decisions). General Chairs run the conference itself (venue, sponsors, banquet). Sometimes the same people, often not.
      zh: Program Chair 负责评审流程（组建 PC、设定截止、最终决策）；General Chair 负责会议本身（场地、赞助、晚宴等）。有时是同一人，多数情况下分开。
      ja: プログラムチェアは査読プロセス（PC編成、締切設定、最終判断）を、ジェネラルチェアは会議運営（会場、スポンサー、バンケット）を担当。同一人物のこともあれば別人のことも。
  camera_ready_short:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Camera-ready
      zh: 终版稿（Camera-ready）
      ja: カメラレディ
    description:
      en: The final version of an accepted paper, formatted for publication. "Camera" is a holdover from offset printing. Usually has a small page extension and stricter formatting checks than the submission.
      zh: 录用论文的最终发表版本，需按出版社模板排版。"Camera" 一词来源于早期胶片印刷。通常比投稿版多 1–2 页空间，并接受更严格的格式审查。
      ja: 採択された論文の最終出版版。「カメラ」は昔のオフセット印刷の名残。投稿版より1〜2ページ増やせることが多いが、書式チェックはより厳格です。
  notification:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Notification
      zh: 录用通知
      ja: 採否通知
    description:
      en: The date you're told whether your paper was accepted, rejected, or conditionally accepted. Usually accompanied by reviewer comments and the meta-review.
      zh: 论文录用结果（录用、拒稿、有条件录用）的通知日期。通常会附上 reviewer 意见和综合评审。
      ja: 論文の採否（採択／不採択／条件付き採択）が通知される日。通常はレビューコメントとメタレビューも一緒に届きます。
  withdrawal:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Withdrawal deadline
      zh: 撤稿截止
      ja: 取り下げ締切
    description:
      en: After this date you typically cannot withdraw the paper, and the venue may still publish it if accepted. Important if you're considering submitting elsewhere.
      zh: 过了这个日期通常就不能撤回论文，即使你想撤，会议仍可能照常发表。如果在考虑投到其他会议，要特别注意。
      ja: この日付を過ぎると基本的に論文を取り下げられず、採択された場合はそのまま出版されることもあります。他の会議への投稿を検討中なら要注意。
  page_limit:
    category:
      en: Format
      zh: 格式
      ja: フォーマット
    full:
      en: Page limit (e.g., "10+2")
      zh: 篇幅限制（如「10+2」）
      ja: ページ数制限（例「10+2」）
    description:
      en: Almost always written as "X+Y" — X pages of content + Y pages of references (which don't count toward the limit). Going over is a desk-reject offense. Camera-ready usually allows +1 or +2 pages.
      zh: 几乎都写作「X+Y」格式 —— X 页正文 + Y 页参考文献（参考文献不计入篇幅）。超页会被桌拒。camera-ready 通常多给 1–2 页空间。
      ja: ほぼ常に「X+Y」形式で書かれます（X = 本文ページ、Y = 参考文献ページ。参考文献は制限外）。超過はデスクリジェクト対象。camera-ready では +1〜2 ページ許可されることが多いです。
  supplementary:
    category:
      en: Format
      zh: 格式
      ja: フォーマット
    full:
      en: Supplementary material
      zh: 补充材料
      ja: 補足資料
    description:
      en: Appendix, extra proofs, videos, datasets, source code uploaded alongside the paper. Reviewers are not required to read it. Should be self-contained — the main paper must stand on its own.
      zh: 与论文一同提交的附录、补充证明、视频、数据集、源代码等。评审没有义务阅读。补充材料应当独立，主论文必须能独立成文。
      ja: 論文と一緒に提出する付録、追加証明、動画、データセット、ソースコードなど。査読者に読む義務はありません。本体論文だけで完結している必要があります。
  artifact:
    category:
      en: Format
      zh: 格式
      ja: フォーマット
    full:
      en: Artifact evaluation
      zh: Artifact 评估（可复现性评估）
      ja: アーティファクト評価
    description:
      en: A separate review process where committee members try to reproduce the paper's results from your provided code/data. Common in systems venues (OSDI, ASPLOS, PLDI, ISCA). Earns a "Results Replicated" badge.
      zh: 独立的复现性评审环节，评委尝试用作者提供的代码与数据复现论文结果。在系统类会议（OSDI、ASPLOS、PLDI、ISCA）中常见，通过后获颁「Results Replicated」徽章。
      ja: 著者が提供したコード/データから論文の結果を再現できるかを別途審査する仕組み。システム系会議（OSDI、ASPLOS、PLDI、ISCA）でよく行われ、合格すると「Results Replicated」バッジが付与されます。
  best_paper:
    category:
      en: Awards & honors
      zh: 奖项
      ja: 賞
    full:
      en: Best Paper Award
      zh: 最佳论文奖
      ja: ベストペーパー賞
    description:
      en: Selected by an award committee (not the PC) from a shortlist of nominated papers. "Best Paper" usually 1–3 per venue, "Distinguished/Honourable" awards a wider 5–10%. Strong CV signal.
      zh: 由专门的奖项委员会（不是 PC）从提名论文中评选，「Best Paper」通常每会 1–3 篇，「Distinguished / Honourable」奖范围更广（前 5–10%）。在简历上很有分量。
      ja: 専用の選考委員会（PC ではない）がノミネート論文から選ぶ。「Best Paper」は通常1〜3本、「Distinguished/Honourable」はより広く上位5〜10%程度。CV 上の強いアピール材料。
  test_of_time:
    category:
      en: Awards & honors
      zh: 奖项
      ja: 賞
    full:
      en: Test of Time Award
      zh: 时间检验奖（Test of Time）
      ja: タイム・オブ・テスト賞
    description:
      en: Awarded ~10 years after publication to a paper that has had a lasting impact on the field. The most prestigious recognition a paper can earn from a venue.
      zh: 在论文发表约 10 年后颁发，授予对领域有持久影响力的论文。是会议能给予论文的最高荣誉。
      ja: 論文発表からおよそ10年後に、分野へ持続的な影響を与えた論文に授与される賞。会議が論文に与え得る最高の名誉です。
  paper_types:
    category:
      en: Paper types
      zh: 论文类型
      ja: 論文タイプ
    full:
      en: Full / short / position / vision / demo
      zh: Full / Short / Position / Vision / Demo
      ja: フル／ショート／ポジション／ビジョン／デモ
    description:
      en: Full papers are mature research (8–12 pages); short papers are early-stage (4–6 pages); position/vision papers argue an opinion or future direction; demo papers describe a runnable system (2–4 pages + on-site demo).
      zh: Full paper 是成熟工作（8–12 页）；short paper 是早期成果（4–6 页）；position / vision paper 提出观点或未来方向；demo paper 描述可运行系统（2–4 页 + 现场演示）。
      ja: フルペーパーは成熟した研究（8〜12ページ）、ショートは初期段階（4〜6ページ）、ポジション/ビジョンは意見や将来方向を主張、デモは動作するシステムを記述（2〜4ページ＋現地デモ）。
  arr:
    category:
      en: Submission systems
      zh: 投稿系统
      ja: 投稿システム
    full:
      en: ARR — ACL Rolling Review
      zh: ARR —— ACL 滚动评审
      ja: ARR — ACL ローリングレビュー
    description:
      en: A monthly review pool for ACL-family conferences. Submit any time → get reviews → "commit" the reviewed paper to a specific venue (ACL, EMNLP, NAACL, EACL). Decouples reviewing from venue scheduling.
      zh: 面向 ACL 系会议的月度滚动评审池。任意时间投稿 → 拿到评审 → 把已评审论文「commit」到具体会议（ACL、EMNLP、NAACL、EACL）。评审与会议日程解耦。
      ja: ACL系会議向けの月次ローリングレビュー。任意のタイミングで投稿 → 査読を受ける → 査読済み論文を特定の会議（ACL、EMNLP、NAACL、EACL）に「commit」する仕組み。査読と会議スケジュールを分離。
  journal_first:
    category:
      en: Paper types
      zh: 论文类型
      ja: 論文タイプ
    full:
      en: Journal-first track
      zh: Journal-first 通道
      ja: ジャーナルファースト・トラック
    description:
      en: A track that invites authors of recently accepted journal papers to present at the conference (no second review). Common in software engineering (ICSE, FSE) and systems venues.
      zh: 邀请近期被期刊录用的论文作者到会议上做报告的通道，不需要再次评审。在软件工程（ICSE、FSE）和系统类会议中常见。
      ja: 直近に採択されたジャーナル論文の著者を、再査読なしに会議で発表に招くトラック。ソフトウェア工学（ICSE、FSE）やシステム系会議でよく見られます。
  early_bird:
    category:
      en: Time & deadlines
      zh: 时间与截止
      ja: 時間と締切
    full:
      en: Early-bird registration
      zh: 早鸟注册
      ja: 早期登録
    description:
      en: Discounted conference registration available before a cutoff date (typically 1–2 months before the event). At least one author of every accepted paper must register, often by this date, or the paper is pulled.
      zh: 在截止日期前（通常会议前 1–2 个月）以折扣价完成会议注册。每篇录用论文通常需要至少一位作者按时完成注册，否则论文会被撤下。
      ja: 締切日（通常は会期の1〜2ヶ月前）までに割引価格で参加登録できる仕組み。採択論文ごとに少なくとも1名の著者が期日内に登録する必要があり、未登録だと論文が削除されることが多いです。
  shadow_pc:
    category:
      en: Roles
      zh: 角色
      ja: 役割
    full:
      en: Shadow PC
      zh: Shadow PC（影子 PC）
      ja: シャドウ PC
    description:
      en: A parallel committee of junior researchers (often PhD students) that reviews the same submissions as the real PC but has no decision power. A training program for future PC members.
      zh: 由初级研究者（多为博士生）组成的影子委员会，与真实 PC 同步评审相同论文但没有决定权。本质上是未来 PC 成员的培训项目。
      ja: 若手研究者（多くは博士課程の学生）で構成される並行委員会。実際の PC と同じ論文を査読しますが、採否決定権はありません。将来の PC メンバー育成プログラムの位置付け。
